<!DOCTYPE html>
<html lang="dv" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RASFAHI ELECTION COMMANDER (CLOUD EDITION)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    
    <style>
        /* ============================================================
           I. ROOT ARCHITECTURE & THEME SYSTEM 
           ============================================================ */
        @font-face {
            font-family: 'Faruma';
            src: url('fonts/faruma.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: block;
        }

        * {
            font-family: 'Faruma', sans-serif !important;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0; 
            padding: 0;
        }

        :root {
            --primary-bg: #000814;
            --secondary-bg: #001d3d;
            --accent-gold: #ffc300;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --success-green: #2ecc71;
            --danger-red: #e74c3c;
            --info-blue: #3498db;
            --card-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        html, body {
            width: 100%;
            max-width: 100vw;
            overflow-x: hidden;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            min-height: 100vh;
            border: 6px solid var(--accent-gold); 
            line-height: 1.6;
            position: relative;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--primary-bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 4px; }

        /* Login Overlay */
        #firebase-login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #001d3d 0%, #000814 100%);
            z-index: 10000; display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }
        
        .login-box {
            background: rgba(0, 29, 61, 0.95); padding: 30px 20px; border-radius: 20px;
            width: 100%; max-width: 400px; text-align: center; color: #fff;
            border: 2px solid var(--accent-gold); box-shadow: 0 0 30px rgba(255, 195, 0, 0.2);
        }

        .login-input {
            width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px;
            background: #000; font-size: 16px; text-align: center;
            border: 1px solid var(--accent-gold); color: #fff;
            appearance: none; 
        }

        .login-box button {
            width: 100%; padding: 15px; border-radius: 10px; cursor: pointer; 
            font-size: 18px; font-weight: bold; transition: 0.3s;
            background: var(--accent-gold); color: #000; border: none;
        }
        
        .login-box button:hover { filter: brightness(1.2); }

        /* App Header */
        .app-header {
            background: linear-gradient(180deg, #001d3d 0%, #000814 100%);
            padding: 15px 5%; border-bottom: 3px solid var(--accent-gold);
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .header-brand h1 { font-size: clamp(1.2rem, 4vw, 2rem); letter-spacing: 2px; color: var(--accent-gold); }
        .user-badge { font-size: 12px; color: #00e676; margin-top: 5px; font-weight: bold; letter-spacing: 1px; }

        /* Dashboard */
        .main-dashboard { padding: 20px 5%; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .card { background: var(--secondary-bg); border: 1.5px solid rgba(255, 195, 0, 0.35); border-radius: 20px; padding: 20px; box-shadow: var(--card-shadow); width: 100%; overflow: hidden; }
        .card-title { color: var(--accent-gold); font-size: 1.1rem; text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255, 195, 0, 0.35); padding-bottom: 10px; }
        .chart-container { position: relative; height: 350px; width: 100%; }

        .summary-stack { display: flex; flex-direction: column; gap: 15px; justify-content: center; height: 100%; }
        .summary-block { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; text-align: center; border-right: 6px solid var(--accent-gold); }
        .count-value { font-size: 2.2rem; font-weight: 900; display: block; line-height: 1; }
        .count-label { font-size: 0.85rem; color: var(--text-dim); margin-top: 8px; letter-spacing: 1px; }

        /* Configuration Grid for Candidates */
        .config-area { padding: 0 5% 20px 5%; width: 100%; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; background: var(--secondary-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--accent-gold); width: 100%; }
        .candidate-input-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; border: 1px solid #1e293b; text-align: center; }
        .candidate-input-box input[type="text"] { width: 100%; padding: 10px; background: #000; border: 1px solid #334155; color: #fff; border-radius: 8px; margin-bottom: 10px; text-align: center; font-size: 14px; }
        .manual-votes-input { width: 60px; padding: 8px; background: #000; color: var(--accent-gold); border: 1px solid #334155; border-radius: 5px; text-align: center; font-size: 14px; }
        .input-row-flex { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }

        /* Toolbar */
        .command-toolbar { margin: 0 5% 20px 5%; background: #ffffff; padding: 20px; border-radius: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        .search-engine { flex: 1 1 100%; min-width: 100%; }
        .search-engine input { width: 100%; padding: 15px 20px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; color: #000; }
        .station-selector { flex: 1 1 100%; min-width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 1rem; color: #000; }
        
        .btn-stack { display: flex; gap: 10px; flex-wrap: wrap; width: 100%; justify-content: center; }
        .action-btn { flex: 1 1 calc(25% - 10px); min-width: 130px; padding: 12px 10px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; color: #fff; font-size: 0.9rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .action-btn:active { transform: scale(0.95); }
        
        .btn-save { background: var(--success-green); color: #000; }
        .btn-tv { background: linear-gradient(45deg, #e67e22, #d35400); }
        .btn-print { background: var(--accent-gold); color: #000; }
        .btn-export { background: #8e44ad; }
        .btn-import { background: #3498db; }
        .btn-reset { background: var(--danger-red); }
        .btn-logout { background: #34495e; }

        /* Table Repository */
        .repository-container { margin: 0 5% 50px 5%; background: #fff; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; }
        .table-scroll { width: 100%; overflow-x: auto; display: block; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; } 
        thead th { background: var(--secondary-bg); color: var(--accent-gold); padding: 15px 10px; font-size: 0.9rem; border-bottom: 4px solid var(--accent-gold); text-align: center; white-space: nowrap; }
        tbody td { padding: 12px 8px; border-bottom: 1px solid #e2e8f0; text-align: center; color: #1e293b; font-size: 0.95rem; font-weight: bold; white-space: nowrap; }
        tbody tr:nth-child(even) { background-color: #f8fafc; }
        tbody tr:hover { background: #f1f5f9; }

        /* Interactive Elements */
        .control-toggle { width: 44px; height: 44px; border-radius: 10px; border: 2px solid #cbd5e1; background: #fff; cursor: pointer; font-size: 1.2rem; transition: 0.1s; color: #cbd5e1; display: inline-flex; align-items: center; justify-content: center; }
        .control-toggle:hover { border-color: var(--success-green); color: var(--success-green); }
        .active-voted { background: var(--success-green) !important; color: #fff !important; border-color: transparent !important; }
        
        .support-dropdown { padding: 10px; border-radius: 8px; border: 2px solid #cbd5e1; background: #fff; color: #000; font-weight: bold; outline: none; font-size: 0.95rem; cursor: pointer; width: 100%; max-width: 150px; text-align: center; appearance: none; }
        .support-dropdown:focus { border-color: var(--accent-gold); }
        .admin-disabled-btn { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

        /* Toast Notification */
        #toast-msg { visibility: hidden; min-width: 250px; background-color: var(--success-green); color: #000; text-align: center; border-radius: 10px; padding: 16px; position: fixed; z-index: 99999; left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 16px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.5s; }
        #toast-msg.show { visibility: visible; opacity: 1; }

        /* Responsive Media Queries */
        @media (min-width: 768px) {
            .search-engine, .station-selector { min-width: 200px; flex: 1; }
            .command-toolbar { flex-wrap: nowrap; }
            .login-box { padding: 40px; }
        }
        @media (max-width: 1024px) { 
            .main-dashboard { grid-template-columns: 1fr; } 
            .chart-container { height: 300px; }
            .summary-stack { flex-direction: row; flex-wrap: wrap; }
            .summary-block { flex: 1 1 calc(33.333% - 15px); min-width: 120px; border-right: none; border-bottom: 5px solid var(--accent-gold); }
        }
        @media (max-width: 600px) {
            body { border-width: 0; padding-bottom: 20px; } 
            .app-header { flex-direction: column; text-align: center; gap: 10px; padding: 15px; border-top: 4px solid var(--accent-gold); }
            .main-dashboard, .command-toolbar, .config-area, .repository-container { padding-left: 10px; padding-right: 10px; margin-left: 10px; margin-right: 10px; }
            .action-btn { flex: 1 1 calc(50% - 10px); }
        }
        @media print { 
            .no-print { display: none !important; } 
            body { border: none; background: #fff; color: #000; overflow: visible; max-width: none; } 
            .repository-container {box-shadow: none; border: 1px solid #000; margin: 0;} 
            table, th, td { border: 1px solid #000; color: #000; padding: 6px; white-space: normal;} 
            .table-scroll { overflow: visible; display: table; } 
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="toast-msg"><i class="fas fa-check-circle"></i> ސަރވަރަށް ސޭވްވެއްޖެ!</div>

<div id="firebase-login-overlay" style="display: flex;">
    <div class="login-box">
        <i class="fas fa-cloud" style="font-size: 40px; color: var(--accent-gold); margin-bottom: 15px;"></i>
        <h1 style="color: var(--accent-gold); margin-bottom: 5px; font-size: 24px;">RASFAHI CLOUD</h1>
        <p style="color: #94a3b8; font-size: 12px; margin-bottom: 25px; letter-spacing: 2px;">SECURE LOGIN</p>
        
        <select id="login-station" class="login-input" style="cursor: pointer; background: #001d3d;">
            <option value="Admin">މެއިން އެޑްމިން (Main Admin)</option>
            <option value="Center 1">Center 1</option>
            <option value="Center 2">Center 2</option>
            <option value="Center 3">Center 3</option>
            <option value="Center 4">Center 4</option>
            <option value="Center 5">Center 5</option>
            <option value="Center 6">Center 6</option>
            <option value="Center 7">Center 7</option>
            <option value="Center 8">Center 8</option>
            <option value="Center 9">Center 9</option>
            <option value="Center 10">Center 10</option>
        </select>

        <input type="email" id="login-email" class="login-input" placeholder="ފަޔަރބޭސް އީމެއިލް">
        <input type="password" id="login-pass" class="login-input" placeholder="ޕާސްވޯޑް">
        
        <button onclick="loginToCloud()">ސިސްޓަމަށް ވަންނަވާ</button>
        <p id="login-msg" style="color:#ff5252; font-size:14px; margin-top:15px; font-weight:bold;"></p>
    </div>
</div>

<div id="main-app" style="display: none;">
    <header class="app-header no-print">
        <div class="header-brand">
            <h1>RASFAHI ELECTION COMMANDER</h1>
            <div class="user-badge"><i class="fas fa-user-shield"></i> CLOUD ROLE: <span id="display-user-role"></span></div>
        </div>
        <div style="color: white; font-size: 1.1rem; margin-top: 10px;" id="digital-clock"></div>
    </header>

    <main>
        <section class="main-dashboard no-print">
            <div class="card">
                <h3 class="card-title"><i class="fas fa-chart-simple"></i> ތާއީދާއި ވޯޓުގެ އަޅާކިޔުން (Live Comparison)</h3>
                <div class="chart-container">
                    <canvas id="dualPerformanceChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3 class="card-title"><i class="fas fa-square-poll-vertical"></i> މަރުކަޒުގެ ޚުލާސާ</h3>
                <div class="summary-stack">
                    <div class="summary-block">
                        <span id="disp-total-reg" class="count-value">0</span>
                        <span class="count-label">ޖުމްލަ ރެޖިސްޓްރީ</span>
                    </div>
                    <div class="summary-block" style="border-color: var(--success-green);">
                        <span id="disp-voted-count" class="count-value" style="color: var(--success-green);">0</span>
                        <span class="count-label">ވޯޓުލީ މީހުން</span>
                    </div>
                    <div class="summary-block" style="border-color: var(--danger-red);">
                        <span id="disp-pending-count" class="count-value" style="color: var(--danger-red);">0</span>
                        <span class="count-label">ވޯޓު ނުލާ ބާކީ</span>
                    </div>
                </div>
            </div>
        </section>

        <section class="config-area no-print" id="admin-config-area">
            <div class="config-grid" id="candidateControlContainer"></div>
        </section>

        <section class="command-toolbar no-print">
            <div class="search-engine">
                <input type="text" id="masterSearch" placeholder="ނަން، އައިޑީ، އެޑްރެސް ނުވަތަ ފޯނުން ހޯއްދަވާ..." oninput="refreshUI()">
            </div>

            <select id="stationFilter" class="station-selector" onchange="refreshUI()">
                <option value="all">ހުރިހާ މަރުކަޒެއް</option>
            </select>

            <div class="btn-stack">
                <button class="action-btn btn-save" onclick="forceSaveData()">
                    <i class="fas fa-save"></i> ސޭވްކުރައްވާ
                </button>
                <button class="action-btn btn-tv" onclick="openTVScreen()">
                    <i class="fas fa-tv"></i> ޓީވީ ސްކްރީން
                </button>
                <button class="action-btn btn-print" onclick="window.print()">
                    <i class="fas fa-print"></i> ޕްރިންޓް
                </button>
                <button class="action-btn btn-export" onclick="exportToCSV()">
                    <i class="fas fa-file-export"></i> އެކްސްޕޯރޓް
                </button>
                
                <button class="action-btn btn-import admin-only-btn" onclick="document.getElementById('csvInput').click()">
                    <i class="fas fa-upload"></i> ލިސްޓް އަރުވާ
                </button>
                <button class="action-btn btn-dummy admin-only-btn" onclick="generateAndDownloadDummyCSV()">
                    <i class="fas fa-file-csv"></i> ޑަމީ ޑޭޓާ
                </button>
                <button class="action-btn btn-reset admin-only-btn" onclick="resetServerData()">
                    <i class="fas fa-trash-alt"></i> ސަރވަރ ރީސެޓް
                </button>
                
                <button class="action-btn btn-logout" onclick="logoutCloud()">
                    <i class="fas fa-sign-out-alt"></i> ލޮގްއައުޓް
                </button>
            </div>
            <input type="file" id="csvInput" hidden accept=".csv" onchange="handleCSVImport(event)">
        </section>

        <section class="repository-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 8%;">ސީރިއަލް</th>
                            <th style="width: 20%;">ފުރިހަމަ ނަން</th>
                            <th style="width: 12%;">އައިޑީ ކާޑު</th>
                            <th style="width: 18%;">އެޑްރެސް</th>
                            <th style="width: 12%;">ފޯނު ނަންބަރު</th>
                            <th style="width: 10%;">މަރުކަޒު</th>
                            <th style="width: 12%;">ތާއީދުކުރަނީ</th>
                            <th style="width: 8%;">ވޯޓު</th>
                        </tr>
                    </thead>
                    <tbody id="voterDataRows"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script>
    /* ============================================================
       III. FIREBASE CONFIGURATION
       ============================================================ */
    const firebaseConfig = {
      apiKey: "AIzaSyBJCkYPTLQde8RWKtrPrpCqOIupGxE3TQI",
      authDomain: "votelive-79601.firebaseapp.com",
      projectId: "votelive-79601",
      storageBucket: "votelive-79601.firebasestorage.app",
      messagingSenderId: "711768145372",
      appId: "1:711768145372:web:14aec408485a3d835da319"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const auth = firebase.auth();
    const db = firebase.firestore();

    /* ============================================================
       IV. SYSTEM STATE MANAGER
       ============================================================ */
    let VOTER_STORE = [];
    let CANDIDATE_STORE = [];
    let currentUserRole = "none";
    let dualChartInstance;

    // 10 Colors for candidates
    const candColors = ['#ffc300', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6', '#f1c40f', '#e67e22', '#1abc9c', '#34495e', '#ff9ff3'];
    
    // Create 10 Default Candidates array
    const defaultCandidates = Array.from({length: 10}, (_, i) => ({
        id: `cand_${i}`, 
        name: `ކެނޑިޑޭޓް ${i + 1}`, 
        manualOffset: 0, 
        themeColor: candColors[i], 
        photo: 'https://via.placeholder.com/65'
    }));

    // Digital Clock
    setInterval(() => { 
        const clk = document.getElementById('digital-clock'); 
        if(clk) clk.innerText = new Date().toLocaleTimeString('en-GB'); 
    }, 1000);

    /* ============================================================
       VI. FIREBASE AUTHENTICATION
       ============================================================ */
    auth.onAuthStateChanged((user) => {
        if (user) {
            document.getElementById('firebase-login-overlay').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            
            let savedStation = localStorage.getItem('rasfahi_active_station') || "Admin"; 
            currentUserRole = (savedStation === "Admin") ? "admin" : savedStation;
            
            document.getElementById('display-user-role').innerText = currentUserRole === 'admin' ? "MAIN ADMIN (VIEW ONLY)" : currentUserRole.toUpperCase();
            
            setupUIForRole(); 
            initDualPerformanceChart(); 
            startCloudSync();
        } else {
            document.getElementById('firebase-login-overlay').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
        }
    });

    function loginToCloud() {
        const email = document.getElementById('login-email').value.trim();
        const pass = document.getElementById('login-pass').value.trim();
        const station = document.getElementById('login-station').value;
        const msg = document.getElementById('login-msg');

        if (!email || !pass) { msg.innerText = "އީމެއިލް އަދި ޕާސްވޯޑް ޖައްސަވާ!"; return; }
        
        msg.style.color = "#ffc300"; 
        msg.innerText = "ކްލައުޑަށް ގުޅެނީ...";

        auth.signInWithEmailAndPassword(email, pass).then(() => {
            localStorage.setItem('rasfahi_active_station', station);
            msg.innerText = "";
        }).catch((err) => { 
            msg.style.color = "#e74c3c"; 
            msg.innerText = "ލޮގިން ފެއިލްވި: އީމެއިލް ނުވަތަ ޕާސްވޯޑް ނުބައި."; 
        });
    }

    function logoutCloud() { 
        localStorage.removeItem('rasfahi_active_station'); 
        auth.signOut().then(() => location.reload()); 
    }

    function setupUIForRole() {
        const adminBtns = document.querySelectorAll('.admin-only-btn');
        if (currentUserRole === "admin") {
            adminBtns.forEach(btn => btn.style.display = 'flex');
            document.getElementById('admin-config-area').style.display = 'grid';
        } else {
            adminBtns.forEach(btn => btn.style.display = 'none');
            document.getElementById('admin-config-area').style.display = 'none';
        }
    }

    /* ============================================================
       VII. SYNC & UI LOGIC
       ============================================================ */
    function startCloudSync() {
        // Sync Voters
        db.collection('rasfahi_voters').onSnapshot((snapshot) => {
            VOTER_STORE = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
            syncStationDropdown(); 
            refreshUI();
        });

        // Sync 10 Candidates
        db.collection('rasfahi_candidates').onSnapshot((snapshot) => {
            if (snapshot.empty && currentUserRole === 'admin') {
                defaultCandidates.forEach(c => db.collection('rasfahi_candidates').doc(c.id).set(c));
            } else {
                CANDIDATE_STORE = snapshot.docs.map(doc => ({ firebaseId: doc.id, ...doc.data() }));
                // Sort array properly cand_0 to cand_9
                CANDIDATE_STORE.sort((a, b) => parseInt(a.id.split('_')[1]) - parseInt(b.id.split('_')[1]));
                if (currentUserRole === 'admin') renderCandidateControls();
                refreshUI();
            }
        });
    }

    function syncStationDropdown() {
        const select = document.getElementById('stationFilter');
        let stations = [...new Set(VOTER_STORE.map(v => v.st))].sort();
        
        if (currentUserRole === 'admin') {
            const currentSel = select.value;
            select.innerHTML = '<option value="all">ހުރިހާ މަރުކަޒެއް</option>' + stations.map(s => `<option value="${s}">${s}</option>`).join('');
            if(stations.includes(currentSel) || currentSel === 'all') select.value = currentSel;
            select.disabled = false;
        } else {
            select.innerHTML = `<option value="${currentUserRole}">${currentUserRole}</option>`;
            select.disabled = true;
        }
    }

    function initDualPerformanceChart() {
        if(dualChartInstance) return;
        const ctx = document.getElementById('dualPerformanceChart').getContext('2d');
        dualChartInstance = new Chart(ctx, {
            type: 'bar',
            data: { labels: [], datasets: [
                { label: 'ތާއީދު', data: [], backgroundColor: [], borderColor: [], borderWidth: 1.5, borderRadius: 6 },
                { label: 'ވޯޓުލީ', data: [], backgroundColor: [], borderColor: [], borderWidth: 1.5, borderRadius: 6 }
            ]},
            options: {
                maintainAspectRatio: false, responsive: true,
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { ticks: { color: '#fff' } } 
                },
                plugins: { legend: { labels: { color: '#fff', padding: 10, boxWidth: 12 } } }
            }
        });
    }

    function refreshUI() {
        if (CANDIDATE_STORE.length === 0) return;
        
        const searchQuery = document.getElementById('masterSearch').value.toLowerCase();
        const activeStation = document.getElementById('stationFilter').value;
        const isAdmin = currentUserRole === 'admin';

        // Filter Dashboard list
        const dashboardList = VOTER_STORE.filter(v => activeStation === 'all' || v.st === activeStation);
        document.getElementById('disp-total-reg').innerText = dashboardList.length;
        document.getElementById('disp-voted-count').innerText = dashboardList.filter(v => v.voted).length;
        document.getElementById('disp-pending-count').innerText = dashboardList.length - dashboardList.filter(v => v.voted).length;

        // Update Chart
        dualChartInstance.data.labels = CANDIDATE_STORE.map(c => c.name);
        const colors = CANDIDATE_STORE.map(c => c.themeColor);
        dualChartInstance.data.datasets[0].backgroundColor = colors.map(c => c + '66');
        dualChartInstance.data.datasets[0].borderColor = colors;
        dualChartInstance.data.datasets[1].backgroundColor = colors;
        dualChartInstance.data.datasets[1].borderColor = colors;

        dualChartInstance.data.datasets[0].data = CANDIDATE_STORE.map((c) => {
            return (parseInt(c.manualOffset) || 0) + dashboardList.filter(v => String(v.sup).trim() === c.id).length;
        });
        dualChartInstance.data.datasets[1].data = CANDIDATE_STORE.map((c) => {
            return (parseInt(c.manualOffset) || 0) + dashboardList.filter(v => v.voted && String(v.sup).trim() === c.id).length;
        });
        dualChartInstance.update();

        // Safe Station Check
        const currentRoleSafe = String(currentUserRole).trim().toLowerCase();
        
        // Filter Table list
        const tableList = VOTER_STORE.filter(v => {
            const matchesSearch = (v.name.toLowerCase().includes(searchQuery) || v.id.toLowerCase().includes(searchQuery) || v.pa.toLowerCase().includes(searchQuery) || (v.phone && v.phone.includes(searchQuery)));
            const matchesStation = (activeStation === 'all' || v.st === activeStation);
            const accessAllowed = (isAdmin || String(v.st).trim().toLowerCase() === currentRoleSafe);
            return matchesSearch && matchesStation && accessAllowed;
        });

        // Render Table
        const tbody = document.getElementById('voterDataRows');
        tbody.innerHTML = tableList.map(v => {
            let currentSup = String(v.sup || 'none').trim();
            
            // Build the Dropdown for 10 candidates
            let dropdownHTML = `<select class="support-dropdown ${isAdmin ? 'admin-disabled-btn' : ''}" onchange="updateVoter('${v.firebaseId}', 'sup', this.value)" ${isAdmin ? 'disabled' : ''}>`;
            dropdownHTML += `<option value="none" ${currentSup === 'none' ? 'selected' : ''}>ނޭނގޭ</option>`;
            CANDIDATE_STORE.forEach(c => { 
                dropdownHTML += `<option value="${c.id}" ${currentSup === c.id ? 'selected' : ''}>${c.name}</option>`; 
            });
            dropdownHTML += `</select>`;

            return `
            <tr>
                <td style="color:var(--danger-red);">${v.sn || '-'}</td>
                <td style="text-align:right;">${v.name}</td>
                <td>${v.id}</td>
                <td>${v.pa}</td>
                <td><a href="tel:${v.phone}" style="color:var(--info-blue); text-decoration:none;">${v.phone || '-'}</a></td>
                <td>${v.st}</td>
                <td>${dropdownHTML}</td>
                <td>
                    <button class="control-toggle ${v.voted?'active-voted':''} ${isAdmin ? 'admin-disabled-btn' : ''}" 
                            onclick="updateVoter('${v.firebaseId}', 'voted', ${!v.voted})" ${isAdmin ? 'disabled' : ''}>
                        <i class="fas fa-check"></i>
                    </button>
                </td>
            </tr>`;
        }).join('');
    }

    /* ============================================================
       VIII. ACTION UPDATES (OPTIMISTIC UI + FIREBASE)
       ============================================================ */
    function updateVoter(docId, field, val) {
        if (currentUserRole === 'admin') { alert("އެޑްމިން އަށް ވޯޓަރ ލިސްޓަށް ބަދަލު ނުގެނެވޭނެއެވެ."); return; }
        
        const voterIndex = VOTER_STORE.findIndex(v => v.firebaseId === docId);
        if(voterIndex === -1) return;

        // 1. Optimistic Update - ސްކްރީނުން ވަގުތުން ބަދަލުފެނުން (Instant visual feedback)
        VOTER_STORE[voterIndex][field] = val;
        refreshUI();

        // 2. Background Firebase Update - ސަރވަރަށް ފޮނުވުން
        let updateData = {}; updateData[field] = val;
        db.collection('rasfahi_voters').doc(docId).update(updateData).catch(err => {
            alert("އަޕްޑޭޓް ކުރުމުގައި މައްސަލައެއް ދިމާވެއްޖެ: " + err.message);
        });
    }

    function showToast(msg) {
        var toast = document.getElementById("toast-msg");
        if(msg) toast.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
        toast.className = "show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function forceSaveData() {
        // Firebase handles saving automatically, this shows a toast to reassure user
        showToast("ސަރވަރަށް މައުލޫމާތު ސޭވްވެއްޖެ!");
    }

    async function resetServerData() {
        if (currentUserRole !== 'admin') { alert("މިކަން ކުރެވޭނީ ހަމައެކަނި އެޑްމިންއަށެވެ."); return; }
        
        let confirmTxt = "ސަމާލުކުރައްވާ! ސަރވަރގައިވާ ހުރިހާ ވޯޓަރ ޑޭޓާއެއް ފޮހެލަން ބޭނުންތޯ؟ (މިއީ އަނބުރާ ގެނެވޭނެ ކަމެއް ނޫން)";
        if (!confirm(confirmTxt)) return;
        
        showToast("ޑޭޓާ ފޮހެވެނީ... މަޑުކޮށްލައްވާ!");
        
        try {
            // Delete all voters
            const snapshot = await db.collection('rasfahi_voters').get();
            const batch = db.batch();
            snapshot.docs.forEach((doc) => { batch.delete(doc.ref); });
            await batch.commit();

            // Reset Candidate Manual Votes to 0
            const candSnap = await db.collection('rasfahi_candidates').get();
            const candBatch = db.batch();
            candSnap.docs.forEach(doc => { candBatch.update(doc.ref, { manualOffset: 0 }); });
            await candBatch.commit();

            alert("ސަރވަރގައިވާ ހުރިހާ ޑޭޓާއެއް އެއްކޮށް ފޮހެލެވިއްޖެ!");
        } catch (error) {
            alert("ފޮހެލުމުގައި މައްސަލައެއް އުޅޭ: " + error.message);
        }
    }

    function renderCandidateControls() {
        const container = document.getElementById('candidateControlContainer');
        container.innerHTML = CANDIDATE_STORE.map((c, i) => `
            <div class="candidate-input-box">
                <div style="margin-bottom:10px; position:relative; display:inline-block;">
                    <img src="${c.photo || 'https://via.placeholder.com/65'}" style="width:70px; height:70px; border-radius:50%; border:2.5px solid ${c.themeColor}; object-fit:cover;">
                    <button onclick="document.getElementById('file-${i}').click()" style="position:absolute; bottom:0; right:0; background:${c.themeColor}; border:none; border-radius:50%; width:28px; height:28px; cursor:pointer;"><i class="fas fa-camera" style="font-size:12px; color:#000;"></i></button>
                    <input type="file" id="file-${i}" hidden accept="image/*" onchange="uploadCandidatePhoto('${c.firebaseId}', event)">
                </div>
                <input type="text" value="${c.name}" onchange="updateCandidateDb('${c.firebaseId}', 'name', this.value)" placeholder="ނަން">
                <div class="input-row-flex">
                    <input type="color" value="${c.themeColor}" onchange="updateCandidateDb('${c.firebaseId}', 'themeColor', this.value)" style="width:35px; height:35px; border:none; border-radius:5px; cursor:pointer;">
                    <input type="number" value="${c.manualOffset}" class="manual-votes-input" onchange="updateCandidateDb('${c.firebaseId}', 'manualOffset', parseInt(this.value) || 0)" placeholder="ވޯޓު">
                </div>
            </div>
        `).join('');
    }

    function updateCandidateDb(docId, field, value) {
        if(currentUserRole !== 'admin') return;
        let updateData = {}; updateData[field] = value;
        db.collection('rasfahi_candidates').doc(docId).update(updateData);
    }

    function uploadCandidatePhoto(docId, event) {
        const file = event.target.files[0];
        if (file) { 
            const reader = new FileReader(); 
            reader.onload = function(e) { 
                db.collection('rasfahi_candidates').doc(docId).update({ photo: e.target.result }); 
            }; 
            reader.readAsDataURL(file); 
        }
    }

    /* ============================================================
       IX. CSV IMPORT / EXPORT / DUMMY
       ============================================================ */
    function handleCSVImport(event) {
        if(currentUserRole !== 'admin') return;
        const file = event.target.files[0]; 
        if (!file) return;
        
        showToast("ލިސްޓް އަޕްލޯޑް ވަނީ... މަޑުކޮށްލައްވާ!");

        const reader = new FileReader();
        reader.onload = async function(e) {
            const lines = e.target.result.split(/\r?\n/).slice(1);
            let batch = db.batch(); 
            let count = 0;
            
            for (let line of lines) {
                if (!line.trim()) continue;
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(part => part.replace(/^"|"$/g, '').trim());
                if (parts.length >= 5) {
                    batch.set(db.collection('rasfahi_voters').doc(), {
                        sn: parts[0] || '', 
                        name: parts[1] || '', 
                        id: parts[2] || '', 
                        pa: parts[3] || '', 
                        phone: parts[4] || '', 
                        st: parts[5] || 'Unassigned', 
                        sup: 'none', 
                        voted: false
                    });
                    count++;
                    
                    if(count % 490 === 0) { 
                        await batch.commit(); 
                        batch = db.batch(); 
                    }
                }
            }
            if(count % 490 !== 0) { await batch.commit(); }
            alert(`${count} މީހުންގެ ލިސްޓް ކްލައުޑަށް އަރުވައިފި!`);
            document.getElementById('csvInput').value = "";
        };
        reader.readAsText(file, 'UTF-8');
    }

    function exportToCSV() {
        if (VOTER_STORE.length === 0) { alert("ޑޭޓާއެއް ނެތް!"); return; }
        
        let csvContent = "\ufeffSerial,Full Name,ID Card,Address,Phone,Station,Support,Voted\n";
        const exportList = VOTER_STORE.filter(v => currentUserRole === 'admin' || String(v.st).trim().toLowerCase() === String(currentUserRole).trim().toLowerCase());
        
        exportList.forEach(v => {
            let supportName = 'Unknown';
            if (v.sup && v.sup !== 'none') { 
                const cand = CANDIDATE_STORE.find(c => c.id === v.sup); 
                if (cand) supportName = cand.name; 
            }
            csvContent += [`"${v.sn || ''}"`, `"${v.name}"`, `"${v.id}"`, `"${v.pa}"`, `"${v.phone || ''}"`, `"${v.st}"`, `"${supportName}"`, `"${v.voted ? 'Voted' : 'Pending'}"`].join(",") + "\n";
        });
        
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
        link.download = `Campaign_Update_${new Date().toISOString().slice(0, 19)}.csv`;
        document.body.appendChild(link); 
        link.click(); 
        document.body.removeChild(link);
    }

    function generateAndDownloadDummyCSV() {
        let csvContent = "Serial,Name,ID,Address,Phone,Station\n";
        for (let i = 1; i <= 200; i++) {
            csvContent += `${i},Voter Name ${i},A${100000 + i},House Address ${i},77${Math.floor(Math.random()*99999)},Center ${Math.floor(Math.random() * 10) + 1}\n`;
        }
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
        link.download = "dummy_voters.csv"; 
        document.body.appendChild(link); 
        link.click(); 
        document.body.removeChild(link);
    }

    /* ============================================================
       X. TV SCREEN POPUP LOGIC
       ============================================================ */
    function openTVScreen() {
        const tvWindow = window.open("", "ElectionTV", "width=1280,height=720");
        
        const tvContent = `
        <!DOCTYPE html>
        <html dir="rtl">
        <head>
            <meta charset="UTF-8">
            <title>RASFAHI LIVE RESULTS - TV VIEW</title>
            <style>
                @font-face { font-family: 'Faruma'; src: url('fonts/faruma.ttf') format('truetype'); font-display: block; }
                * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Faruma', sans-serif !important; }
                body { background: #000814; color: white; overflow: hidden; display: flex; flex-direction: column; height: 100vh; width: 100vw; border: 12px solid #ffc300; }
                .header { height: 60px; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid rgba(255, 195, 0, 0.2); background: rgba(255,195,0,0.05); }
                .main-content { flex: 1; display: grid; grid-template-columns: 1.4fr 0.6fr; gap: 20px; padding: 20px; overflow: hidden; }
                .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,195,0,0.1); border-radius: 20px; padding: 15px; display: flex; flex-direction: column; }
                #bar-chart-container { display: flex; align-items: flex-end; justify-content: space-evenly; gap: 10px; height: 100%; width: 100%; }
                .bar-column { display: flex; flex-direction: column; align-items: center; height: 100%; width: 100%; justify-content: flex-end; }
                .bar-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; height: 95%; justify-content: flex-end; }
                .bar-visual { width: 70%; border-radius: 6px 6px 0 0; background: linear-gradient(to top, var(--c-color), #ffffff); box-shadow: 0 0 25px var(--shadow-color); transition: height 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
                .candidate-label-box { margin-top: 10px; text-align: center; width: 100%; background: rgba(255,255,255,0.07); padding: 8px 5px; border-radius: 12px; border: 2px solid var(--c-color); flex-shrink: 0; }
                .leader-row { display: flex; align-items: center; background: rgba(255,255,255,0.04); border-radius: 10px; border-right: 5px solid #ffc300; margin-bottom: 5px; padding: 5px 12px; flex: 1; }
            </style>
        </head>
        <body>
            <div class="header"><h1 style="color:#ffc300; font-size:1.8rem;">އިންތިޚާބުގެ ލައިވް ނަތީޖާ</h1></div>
            <div class="main-content">
                <div class="card"><div id="bar-chart-container"></div></div>
                <div class="card" style="justify-content: space-between;">
                    <h3 style="color:#ffc300; text-align:center; margin-bottom:10px; font-size:1.3rem;">ވަގުތީ ނަތީޖާގެ ތަރުތީބު</h3>
                    <div id="leaderboard-container" style="display:flex; flex-direction:column; flex:1; overflow:hidden;"></div>
                    <div id="total-voted-display" style="font-size:24px; font-weight:900; color:#2ecc71; text-align:center; padding:10px; border-top:1px solid rgba(255,255,255,0.1);"></div>
                </div>
            </div>
        </body>
        </html>`;

        tvWindow.document.write(tvContent); 
        tvWindow.document.close();

        setInterval(() => {
            if (tvWindow.closed) return;
            const barContainer = tvWindow.document.getElementById('bar-chart-container');
            const leaderboardContainer = tvWindow.document.getElementById('leaderboard-container');
            const totalDisplay = tvWindow.document.getElementById('total-voted-display');

            // Calculate Votes per candidate directly
            const processedData = CANDIDATE_STORE.map((c) => {
                let manual = parseInt(c.manualOffset) || 0;
                let live = VOTER_STORE.filter(v => v.voted && String(v.sup).trim() === c.id).length;
                return { 
                    name: c.name || "ކެނޑިޑޭޓް", 
                    totalVotes: manual + live, 
                    color: c.themeColor || "#ffc300", 
                    photo: c.photo || 'https://via.placeholder.com/50' 
                };
            });

            const grandTotalVotes = processedData.reduce((sum, c) => sum + c.totalVotes, 0);
            const activeCandidates = processedData.filter(c => c.totalVotes > 0 || c.name); 
            const maxVotes = Math.max(...processedData.map(c => c.totalVotes), 1);

            // Render Bar Chart
            if (barContainer) {
                const maxWidth = activeCandidates.length > 8 ? "60px" : (activeCandidates.length > 5 ? "80px" : "120px");
                const labelFontSize = activeCandidates.length > 8 ? "9px" : "12px";
                
                barContainer.innerHTML = activeCandidates.map(c => {
                    const percent = grandTotalVotes > 0 ? ((c.totalVotes / grandTotalVotes) * 100).toFixed(1) : 0;
                    const barHeightPercent = (c.totalVotes / maxVotes) * 75;
                    return `
                        <div class="bar-column" style="max-width: ${maxWidth};">
                            <div class="bar-wrapper">
                                <div style="color:#ffc300; font-weight:900; font-size:1.1rem; margin-bottom:5px;">${percent}%</div>
                                <div class="bar-visual" style="height:${barHeightPercent}%; --c-color:${c.color}; --shadow-color:${c.color}66;"></div>
                            </div>
                            <div class="candidate-label-box" style="--c-color:${c.color}; padding: 5px 2px;">
                                <img src="${c.photo}" style="width:35px; height:35px; border-radius:50%; border:2px solid ${c.color}; object-fit:cover; background:#000;">
                                <div style="font-size:${labelFontSize}; color:#fff; font-weight:bold; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; margin:4px 0;">${c.name}</div>
                                <div style="font-size:18px; font-weight:900; color:${c.color}; line-height:1;">${c.totalVotes}</div>
                            </div>
                        </div>`;
                }).join('');
            }

            // Render Leaderboard
            if (leaderboardContainer) {
                const sorted = [...activeCandidates].sort((a, b) => b.totalVotes - a.totalVotes);
                const displayLimit = Math.min(sorted.length, 8);
                
                leaderboardContainer.innerHTML = sorted.slice(0, displayLimit).map((c, i) => `
                    <div class="leader-row" style="border-right-color: ${c.color};">
                        <div style="font-size:16px; font-weight:bold; color:#ffc300; width:30px; text-align:center;">${i+1}</div>
                        <img src="${c.photo}" style="width:30px; height:30px; border-radius:50%; margin: 0 8px; border:1.5px solid ${c.color}; object-fit:cover;">
                        <div style="flex-grow:1; text-align:right;">
                            <div style="font-size:14px; color:#fff; font-weight:bold; line-height:1;">${c.name}</div>
                            <div style="font-size:10px; color:rgba(255,195,0,0.5);">${((c.totalVotes/Math.max(grandTotalVotes, 1))*100).toFixed(1)}%</div>
                        </div>
                        <div style="font-size:20px; font-weight:900; color:${c.color}; margin-right:12px;">${c.totalVotes}</div>
                    </div>`).join('');
            }
            
            if (totalDisplay) {
                totalDisplay.innerHTML = `<span style="font-size:16px; color:#94a3b8; font-weight:normal;">ޖުމްލަ ވޯޓު:</span> ${grandTotalVotes}`;
            }
        }, 1500);
    }
</script>
