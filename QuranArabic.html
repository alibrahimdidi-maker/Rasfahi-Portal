<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ރަސްފަހި ޤުރްއާން އިން ޢަރަބި ދަސްކުރުން - Pro Edition v2.5</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        
        /* ފަރުމާ ފޮންޓް ސެޓަޕް */
        @font-face { 
            font-family: 'Faruma'; 
            src: url('fonts/faruma.ttf') format('truetype'),
                 url('https://siyamex.github.io/dhivehifont/Faruma.ttf') format('truetype'); 
            font-weight: normal; font-style: normal; font-display: swap;
        }

        :root {
            --royal-blue: #001a4d;
            --royal-dark: #000c24;
            --royal-green: #063d25;
            --royal-gold: #d4af37;
            --gold-gradient: linear-gradient(145deg, #d4af37, #f2d06b, #aa8a2e);
            --bg-light: #fdfbf7;
            --gemini-bg: #e3f2fd;
            --gemini-border: #1565c0;
        }

        /* --- ސެކިއުރިޓީ: ކޮޕީކުރުން ހުއްޓުވުން --- */
        * { 
            box-sizing: border-box; 
            transition: all 0.2s ease; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ޓެކްސްޓް ސެލެކްޓް ކުރަންޖެހޭ ތަންތަން ހުޅުވާލުން */
        .q-text *, input, textarea, select, .dhivehi-sharah {
            -webkit-user-select: text !important;
            user-select: text !important;
        }
        
        body, html { 
            height: 100vh; margin: 0; padding: 0; 
            font-family: 'Faruma', Arial, sans-serif !important; 
            background: var(--royal-dark); overflow: hidden; 
        }
        
        input, select, button, .action-btn { font-family: 'Faruma', Arial, sans-serif !important; }

        /* --- LOCK SCREEN --- */
        #lock-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle, var(--royal-blue) 0%, #000 100%);
            display: flex; justify-content: center; align-items: center; 
            z-index: 99999; padding: 20px;
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.98); padding: 40px 30px; 
            border-radius: 30px; border: 6px solid var(--royal-gold);
            text-align: center; width: 100%; max-width: 450px; 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            direction: ltr; 
        }

        /* --- APP STRUCTURE --- */
        .royal-wrapper { height: 100vh; display: none; flex-direction: column; background: var(--bg-light); overflow: hidden; }

        header { background: var(--royal-blue); color: var(--royal-gold); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--royal-gold); z-index: 100; flex-shrink: 0; }
        .header-title { margin: 0; font-size: 22px; text-align: center; flex: 1; direction: rtl;}
        .license-tag { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 30px; border: 1px solid var(--royal-gold); font-size: 12px; color: #fff; }

        .main-container { display: flex; flex: 1; overflow: hidden; flex-direction: row; direction: rtl; }

        /* --- PANELS --- */
        .side-panel { width: 380px; background: var(--bg-light); overflow-y: auto; padding: 20px; flex-shrink: 0; display: flex; flex-direction: column; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
        .quran-panel { flex: 1; overflow-y: auto; padding: 25px; background: #fff; position: relative; }

        .search-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; background: #f8f9fa; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 25px; }
        
        .q-text { font-family: 'Amiri', serif; font-size: 38px; line-height: 2.6; text-align: justify; direction: rtl; color: #1a1a1a; padding-bottom: 200px; }
        .q-word { cursor: pointer; padding: 0 4px; border-radius: 6px; display: inline-block; }
        .q-word:hover { background: rgba(212, 175, 55, 0.2); }

        #floating-search-btn { display: none; position: fixed; z-index: 10000; background: var(--gemini-border); color: white; border: 2px solid #fff; padding: 12px 22px; border-radius: 30px; font-weight: bold; font-size: 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); cursor: pointer; transform: translateX(-50%); }

        .report-header { background: #fff; border: 3px solid var(--royal-gold); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 20px; color: var(--royal-blue); font-weight: bold; }
        
        .rep-entry { padding: 18px; border-radius: 12px; margin-bottom: 15px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.04); animation: slideIn 0.3s ease-out; position: relative; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .gemini-box { border-right: 10px solid var(--gemini-border); background: var(--gemini-bg); }
        .sentence-box { border-right: 10px solid var(--royal-green); background: #e8f5e9; }
        
        .dhivehi-sharah { font-family: 'Faruma', Arial, sans-serif !important; font-size: 16px; direction: rtl; color: #222; margin-top: 10px; line-height: 1.8; text-align: right;}
        .muta-meta-data { display: block; font-size: 12px; color: #666; margin-top: 10px; padding-top: 8px; border-top: 1px dashed #ccc; font-weight: bold; text-align: right; }

        .action-btn { padding: 14px; border-radius: 10px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; margin-bottom: 10px; text-transform: uppercase;}
        input, select { padding: 14px; border: 2px solid #ddd; border-radius: 8px; font-size: 15px; width: 100%; margin-bottom: 10px; text-align: right; }
        
        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; padding-top: 20px; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 1024px) {
            body, html { height: auto; overflow: auto; }
            .royal-wrapper { height: auto; overflow: visible; }
            .main-container { flex-direction: column; height: auto; overflow: visible; }
            .quran-panel { height: 50vh; min-height: 450px; border-bottom: 5px solid #ddd; }
            .side-panel { width: 100% !important; height: auto; min-height: 60vh; border: none; border-bottom: 5px solid #ddd; overflow-y: visible; }
            .search-area { grid-template-columns: 1fr; }
            .q-text { font-size: 32px; line-height: 2.3; }
        }

        /* --- PRINT STYLES --- */
        @media print {
            header, .search-area, .quran-panel, .action-btn, .button-group, #floating-search-btn, #lock-screen { display: none !important; }
            body, html { background: #fff !important; overflow: visible !important; }
            .main-container { display: block !important; }
            .side-panel { width: 100% !important; height: auto !important; overflow: visible !important; border: none !important; }
            .hide-for-print { display: none !important; }
            .rep-entry { border: 1px solid #ccc !important; break-inside: avoid; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <button id="floating-search-btn">✨ ޖެމިނައި މެދުވެރިކޮށް ޝަރަޙަކުރޭ</button>

    <div id="lock-screen">
        <div class="lock-card">
            <h1 style="font-family: Arial; color:var(--royal-blue); font-size:28px; font-weight:900;">ROYAL AI SYSTEM</h1>
            <p style="font-family: Arial; font-weight:bold; color:var(--royal-gold); margin:10px 0 25px;">License Activation Required</p>
            <input type="password" id="licenseInput" placeholder="Enter License Key..." style="text-align:center;">
            <button class="action-btn" style="background:var(--royal-blue); color:white;" onclick="verifyLicense()">Activate 🔓</button>
            <p id="licError" style="color:red; font-weight:bold; margin-top:10px; font-size:13px;"></p>
        </div>
    </div>

    <div class="royal-wrapper" id="mainApp">
        <header>
            <div class="license-tag"><span id="licTag">Validating...</span></div>
            <h1 class="header-title">ޤުރްއާނާއެކު ޢަރަބި ބަސް ދަސްކުރުން</h1>
            <div style="font-weight:bold; color:#fff; font-size:12px;">AI PRO v2.5</div>
        </header>

        <div class="main-container">
            
            <div class="side-panel" id="sentences-panel">
                <div class="report-header">📝 މާނައާއި ޖުމްލަތައް</div>
                <div id="sentencesContainer" style="flex:1;"></div>
                <div class="button-group">
                    <button class="action-btn" style="background:#ddd; color:#333;" onclick="document.getElementById('sentencesContainer').innerHTML=''">ކްލިއަރ</button>
                    <button class="action-btn" style="background:var(--royal-green); color:white;" onclick="printSection('sentences-panel')">ޕްރިންޓް 🖨️</button>
                </div>
            </div>

            <div class="quran-panel" id="quran-panel">
                <div class="search-area">
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block;">ދަރިވަރު:</label>
                        <input type="text" id="stuName" placeholder="ނަން ޖައްސަވާ...">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block;">ސޫރަތް:</label>
                        <select id="surahSelect" onchange="fetchSurah()"></select>
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block;">ޖުޒު:</label>
                        <select id="juzSelect" onchange="fetchJuz()">
                            <option value="">ޚިޔާރުކުރައްވާ</option>
                        </select>
                    </div>
                </div>
                <div id="quranDisplay" class="q-text">
                    <p style="text-align:center; color:#ccc; margin-top:100px;">ފެށުމަށް ސޫރަތެއް ނުވަތަ ޖުޒުއެއް ނަންގަވާ!</p>
                </div>
            </div>

            <div class="side-panel" id="grammar-panel">
                <div class="report-header">📖 އިޢުރާބާއި ޤަވާޢިދު</div>
                <div id="grammarContainer" style="flex:1;"></div>
                <div class="button-group">
                    <button class="action-btn" style="background:#ddd; color:#333;" onclick="document.getElementById('grammarContainer').innerHTML=''">ކްލިއަރ</button>
                    <button class="action-btn" style="background:var(--royal-blue); color:white;" onclick="printSection('grammar-panel')">ޕްރިންޓް 🖨️</button>
                </div>
            </div>

        </div>
    </div>

<script>
    // --- SETTINGS ---
    const GEMINI_API_KEY = "AIzaSyCySzBeIDtSA1w0GF21pUjfaip6rfD1RFE";
    let quranData = [];
    let clickTimer = null;

    // Security: Anti-Inspect
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    // License System
    function verifyLicense() {
        const input = document.getElementById('licenseInput').value.trim();
        try {
            const decoded = atob(input);
            if(!decoded.startsWith("ROYAL_EXP_")) throw "Error";
            const parts = decoded.split("_");
            if(new Date() > new Date(parts[2])) { alert("License Expired!"); return; }
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('mainApp').style.display = window.innerWidth <= 1024 ? 'block' : 'flex';
            document.getElementById('licTag').innerText = `User: ${parts[4].replace(/-/g, ' ')}`;
            init();
        } catch(e) { document.getElementById('licError').innerText = "Invalid Key!"; }
    }

    // AI Communication
    async function askGemini(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
        try {
            const res = await fetch(url, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            if(!res.ok) return `⚠️ Error: ${data.error.message}`;
            return data.candidates[0].content.parts[0].text;
        } catch(e) { return "⚠️ Connection Error!"; }
    }

    // App Logic
    async function init() {
        const juzSel = document.getElementById('juzSelect');
        for(let i=1; i<=30; i++) juzSel.innerHTML += `<option value="${i}">ޖުޒު ${i}</option>`;
        try {
            const res = await fetch('https://api.alquran.cloud/v1/quran/quran-uthmani');
            const json = await res.json();
            quranData = json.data.surahs;
            const sSel = document.getElementById('surahSelect');
            sSel.innerHTML = '<option value="">ސޫރަތެއް...</option>';
            quranData.forEach(s => { sSel.innerHTML += `<option value="${s.number}">${s.number}. ${s.name}</option>`; });
        } catch(e) { alert("Network Error!"); }
    }

    function fetchSurah() {
        const val = document.getElementById('surahSelect').value;
        if(val) render(quranData[val-1].ayahs, quranData[val-1].name);
    }

    async function fetchJuz() {
        const j = document.getElementById('juzSelect').value;
        if(!j) return;
        document.getElementById('quranDisplay').innerHTML = '<p style="text-align:center;">ލޯޑުވަނީ... ⏳</p>';
        const res = await fetch(`https://api.alquran.cloud/v1/juz/${j}/quran-uthmani`);
        const json = await res.json();
        render(json.data.ayahs);
    }

    function render(ayahs, sNamePrefix = "") {
        const display = document.getElementById('quranDisplay');
        display.innerHTML = ayahs.map(a => {
            const sN = a.surah ? a.surah.name : sNamePrefix;
            const words = a.text.split(' ').map(w => `<span class="q-word" data-sname="${sN}" data-anum="${a.numberInSurah}">${w}</span>`).join(' ');
            return `<span>${words} <b style="color:var(--royal-gold); font-size:24px;">(${a.numberInSurah})</b> </span>`;
        }).join('');

        document.querySelectorAll('.q-word').forEach(el => {
            el.onclick = function() {
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => handleSingle(this), 300);
            };
            el.ondblclick = function() {
                clearTimeout(clickTimer);
                handleDouble(this);
            };
        });
    }

    async function handleSingle(el) {
        const id = 'e'+Date.now();
        addEntry('grammarContainer', id, `އިޢުރާބު: ${el.innerText}`, el, 'gemini-box', '--gemini-border');
        const p = `Explain the Arabic I'rab of the word '${el.innerText}' in Surah ${el.dataset.sname}, Ayah ${el.dataset.anum} very briefly in Arabic.`;
        updateEntry(id, await askGemini(p));
        if(window.innerWidth <= 1024) document.getElementById('grammar-panel').scrollIntoView();
    }

    async function handleDouble(el) {
        const id = 'e'+Date.now();
        addEntry('sentencesContainer', id, `މާނައާއި ޖުމްލަ: ${el.innerText}`, el, 'sentence-box', '--royal-green');
        const p = `Word: '${el.innerText}'. 1. Arabic Meaning. 2. Dhivehi Meaning. 3. 5 simple Arabic sentences with Dhivehi translation. Use HTML <b> tags.`;
        const a = await askGemini(p);
        updateEntry(id, a.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'));
        if(window.innerWidth <= 1024) document.getElementById('sentences-panel').scrollIntoView();
    }

    // Selection Analysis
    document.addEventListener('selectionchange', () => {
        const s = window.getSelection();
        const b = document.getElementById('floating-search-btn');
        if(s.rangeCount > 0 && s.toString().trim().length > 2 && document.getElementById('quranDisplay').contains(s.anchorNode)) {
            const r = s.getRangeAt(0).getBoundingClientRect();
            b.style.display = 'block'; b.style.top = (r.top + window.scrollY - 60) + 'px'; b.style.left = '50%';
            b.dataset.text = s.toString().trim();
        } else { b.style.display = 'none'; }
    });

    document.getElementById('floating-search-btn').onclick = async function() {
        const id = 'e'+Date.now();
        addEntry('grammarContainer', id, `ޝަރަޙަ: ${this.dataset.text}`, {dataset:{}}, 'gemini-box', '--gemini-border');
        const p = `Analyze this Quranic text: '${this.dataset.text}'. 1. Arabic I'rab breakdown. 2. Dhivehi translation. 3. Detailed grammar rules in Dhivehi. Use HTML.`;
        this.style.display = 'none';
        const a = await askGemini(p);
        updateEntry(id, a.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'));
        if(window.innerWidth <= 1024) document.getElementById('grammar-panel').scrollIntoView();
    };

    function addEntry(con, id, title, el, cls, col) {
        const div = document.createElement('div');
        div.className = `rep-entry ${cls}`; div.id = id;
        div.innerHTML = `<div style="font-weight:bold; color:var(${col}); border-bottom:1px solid #eee; padding-bottom:5px;">${title}</div>
            <div class="dhivehi-sharah" id="${id}-c">ލޯޑުވަނީ... ⏳</div>
            <div class="muta-meta-data">📍 ${el.dataset.sname || '-'} | އާޔަތް: ${el.dataset.anum || '-'}</div>`;
        document.getElementById(con).prepend(div);
    }
    function updateEntry(id, html) { document.getElementById(id+'-c').innerHTML = html; }

    function printSection(id) {
        const sP = document.getElementById('sentences-panel');
        const gP = document.getElementById('grammar-panel');
        id === 'sentences-panel' ? gP.classList.add('hide-for-print') : sP.classList.add('hide-for-print');
        window.print();
        setTimeout(() => { sP.classList.remove('hide-for-print'); gP.classList.remove('hide-for-print'); }, 1000);
    }
</script>
</body>
</html>
