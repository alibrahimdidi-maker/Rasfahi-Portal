<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ޤުރްއާނުން ޢަރަބިބަސް ދަސްކުރުން - Learn Arabic from Quran</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- FONTS --- */
        @font-face { 
            font-family: 'Faruma'; 
            src: url('fonts/faruma.ttf') format('truetype'),
                 url('https://siyamex.github.io/dhivehifont/Faruma.ttf') format('truetype'); 
            font-weight: normal; font-style: normal; font-display: swap;
        }

        :root {
            --royal-blue: #001a4d;
            --royal-dark: #000c24;
            --royal-green: #004d40;
            --neon-green: #00e676;
            --royal-gold: #d4af37;
            --gold-light: #f2d06b;
            --bg-light: #fdfbf7;
            --gemini-blue: #1565c0;
            --sidebar-width: 400px;
        }

        /* --- GLOBAL RESET & SECURITY --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Faruma', Arial, sans-serif !important; 
            background: var(--royal-dark); overflow: hidden; 
            user-select: none; -webkit-user-select: none;
        }

        .q-text *, input, select, .dhivehi-sharah { 
            user-select: text !important; -webkit-user-select: text !important; 
        }

        /* --- 🛡️ LUXURY WELCOME SCREEN (FIXED NO SCROLL) 🛡️ --- */
        #securityOverlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, var(--royal-blue) 0%, #000 100%);
            display: flex; justify-content: center; align-items: center; 
            z-index: 99999; padding: 15px;
        }

        .sec-box {
            background: rgba(0, 12, 18, 0.98);
            width: 480px; max-width: 100%;
            padding: 30px 25px;
            border-radius: 35px;
            border: 2px solid var(--royal-gold);
            box-shadow: 0 0 80px rgba(212, 175, 55, 0.3);
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
            max-height: 98vh; overflow: hidden;
            animation: boxEntry 1s ease-out;
        }

        @keyframes boxEntry {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .admin-pic-wrapper {
            position: relative; display: inline-block; margin-bottom: 20px;
        }

        .admin-pic {
            width: 130px; height: 130px;
            border-radius: 50%;
            border: 4px solid var(--neon-green);
            box-shadow: 0 0 35px rgba(0, 230, 118, 0.3);
            object-fit: cover; background: #000;
        }

        .verified-badge {
            position: absolute; bottom: 8px; right: 8px;
            background: var(--neon-green); color: #000;
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; border: 3px solid var(--royal-dark); font-weight: bold;
        }

        .main-title-ar {
            font-family: 'Amiri', serif; color: #ffffff;
            font-size: 34px; margin: 0; line-height: 1.1;
        }

        .main-title-dv {
            font-family: 'Faruma'; color: var(--royal-gold);
            font-size: 22px; margin: 10px 0 25px;
        }

        .sec-input {
            width: 100%; height: 55px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--royal-green);
            border-radius: 12px;
            color: #fff; text-align: center;
            font-size: 20px; font-family: monospace;
            margin-bottom: 15px;
        }

        .sec-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--royal-green), #00695c);
            border: 1px solid var(--neon-green);
            color: #fff; font-weight: 900;
            border-radius: 12px; cursor: pointer;
            font-size: 16px; letter-spacing: 2px;
            font-family: 'Poppins', sans-serif;
        }

        .footer-info {
            margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 15px; font-size: 11px; color: #90a4ae; line-height: 1.5;
        }

        /* --- 📱 MAIN APP INTERFACE 📱 --- */
        .royal-wrapper { height: 100vh; display: none; flex-direction: column; background: var(--bg-light); overflow: hidden; }

        header { 
            background: var(--royal-blue); color: var(--royal-gold); 
            padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 3px solid var(--royal-gold); flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .header-center h1 { margin: 0; font-size: 20px; font-family: 'Faruma'; color: #fff; }

        .main-container { display: flex; flex: 1; overflow: hidden; direction: rtl; }

        /* --- DESKTOP PANELS --- */
        .side-panel { 
            width: var(--sidebar-width); background: #fdfaf4; 
            overflow-y: auto; padding: 20px; 
            border-left: 1px solid #ddd; border-right: 1px solid #ddd;
            display: flex; flex-direction: column; 
        }
        
        .quran-panel { flex: 1; overflow-y: auto; padding: 25px; background: #fff; position: relative; }

        .panel-title {
            text-align: center; font-weight: bold; padding: 12px; 
            background: #fff; border: 2px solid var(--royal-gold); 
            border-radius: 12px; margin-bottom: 20px; color: var(--royal-blue); font-size: 18px;
        }

        .search-area { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; 
            background: #f1f3f5; padding: 15px; border-radius: 15px; margin-bottom: 25px;
        }
        .search-area label { font-size: 11px; font-weight: bold; color: var(--royal-blue); margin-bottom: 4px; display: block; }
        
        input, select { 
            width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ced4da; 
            font-size: 14px; font-family: 'Faruma' !important; text-align: right;
        }

        /* --- QURAN TEXT --- */
        .q-text { 
            font-family: 'Amiri', serif; font-size: 42px; line-height: 2.8; 
            text-align: justify; color: #1a1a1a; direction: rtl; padding-bottom: 250px;
        }
        .q-word { 
            cursor: pointer; padding: 0 4px; border-radius: 8px; 
            display: inline-block; transition: all 0.15s ease; 
        }
        .q-word:hover { background: rgba(212, 175, 55, 0.2); transform: translateY(-2px); }
        .ayah-num { color: var(--royal-gold); font-weight: bold; font-size: 26px; margin: 0 10px; }

        /* --- CARDS --- */
        .rep-entry { 
            padding: 18px; border-radius: 18px; margin-bottom: 18px; background: #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-right: 12px solid #ccc;
            animation: slideIn 0.4s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        
        .gemini-box { border-right-color: var(--gemini-blue); background: #f5f9ff; }
        .sentence-box { border-right-color: var(--royal-green); background: #f3faf3; }
        
        .dhivehi-sharah { font-size: 17px; line-height: 1.9; color: #2c3e50; margin-top: 12px; text-align: right; }
        .meta-footer { font-size: 11px; color: #7f8c8d; border-top: 1px dashed #ddd; margin-top: 15px; padding-top: 8px; font-weight: bold; display: flex; justify-content: space-between; }

        .btn-group { display: flex; gap: 8px; margin-top: auto; padding-top: 15px; }
        .btn-clear { background: #eceff1; color: #455a64; border: none; padding: 12px; border-radius: 10px; font-weight: bold; flex: 1; cursor: pointer; }
        .btn-print { background: var(--royal-blue); color: #fff; border: none; padding: 12px; border-radius: 10px; font-weight: bold; flex: 1; cursor: pointer; }

        #floating-search-btn { 
            display: none; position: fixed; z-index: 1000; background: var(--gemini-blue); 
            color: #fff; padding: 12px 30px; border-radius: 50px; font-weight: bold; 
            border: 3px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.3); transform: translateX(-50%);
            cursor: pointer; font-family: 'Faruma';
        }

        /* --- 📱 MOBILE OPTIMIZATION (FULL SCREEN FIT) 📱 --- */
        @media (max-width: 1024px) {
            body, html { overflow: auto; }
            .royal-wrapper { height: auto; overflow: visible; }
            .main-container { flex-direction: column; overflow: visible; height: auto; }
            
            /* Quran Panel Full Width & Responsive Height */
            .quran-panel { 
                width: 100% !important; 
                height: auto; 
                min-height: 80vh; 
                padding: 15px; 
                border-bottom: 6px solid #ddd;
                overflow: visible;
            }
            
            /* Side Panels Full Width Underneath */
            .side-panel { 
                width: 100% !important; 
                height: auto; 
                min-height: 500px; 
                border: none; 
                border-bottom: 6px solid #ddd; 
                overflow: visible;
                padding: 15px;
            }
            
            .search-area { grid-template-columns: 1fr; }
            header { padding: 10px 15px; }
            .header-center h1 { font-size: 16px; }
            .q-text { font-size: 32px; line-height: 2.3; padding-bottom: 50px; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <button id="floating-search-btn">✨ ޖެމިނައި ޝަރަޙަ</button>

    <div id="securityOverlay">
        <div class="sec-box">
            <div class="admin-pic-wrapper">
                <img src="Photos/ali.png" class="admin-pic" alt="Ali Ibrahim Didi" onerror="this.src='https://via.placeholder.com/130/001a4d/ffffff?text=Ali+Didi'">
                <div class="verified-badge">✓</div>
            </div>

            <h1 class="main-title-ar">تعلّم اللغة العربية من القرآن</h1>
            <h2 class="main-title-dv">ޤުރްއާނުން ޢަރަބިބަސް ދަސްކުރުން</h2>

            <input type="password" id="licenseKey" class="sec-input" placeholder="Paste License Key Here">
            
            <button class="sec-btn" onclick="verifyLicense()">AUTHENTICATE SYSTEM 🔓</button>
            
            <p id="secMsg" style="color:#ff5252; font-size:14px; margin-top:10px; font-weight:bold;"></p>

            <div class="footer-info">
                <p style="margin-bottom:5px; color: #eee; font-weight: bold;">Ali Ibrahim Didi</p>
                <p style="margin-bottom:8px;">Reg: MED.03.IP.CR.26.EW5889</p>
                <p style="color:var(--royal-gold); font-weight: bold; margin-top:10px; font-size: 13px;">Support: 7791550</p>
            </div>
        </div>
    </div>

    <div class="royal-wrapper" id="mainApp">
        <header>
            <div style="font-size:11px; color:#fff; background:rgba(255,255,255,0.1); padding:6px 15px; border-radius:50px; border:1px solid var(--royal-gold);">
                <span id="licUser">Validating Session...</span>
            </div>
            <div class="header-center">
                <h1>ޤުރްއާނުން ޢަރަބިބަސް ދަސްކުރުން</h1>
            </div>
            <div style="font-weight:900; color:#fff; font-size:11px; letter-spacing:1px; font-family: Arial;">AI PRO v4.5</div>
        </header>

        <div class="main-container">
            <div class="side-panel" id="sentences-panel">
                <div class="panel-title">📝 މާނައާއި ޖުމްލަތައް</div>
                <div id="sentencesContainer" style="flex:1;"></div>
                <div class="btn-group">
                    <button class="btn-clear" onclick="document.getElementById('sentencesContainer').innerHTML=''">ކްލިއަރ</button>
                    <button class="btn-print" onclick="window.print()">ޕްރިންޓް 🖨️</button>
                </div>
            </div>

            <div class="quran-panel" id="quran-panel">
                <div class="search-area">
                    <div>
                        <label>ދަރިވަރު:</label>
                        <input type="text" id="stuName" placeholder="ނަން ޖައްސަވާ...">
                    </div>
                    <div>
                        <label>ސޫރަތް:</label>
                        <select id="surahSelect" onchange="fetchSurah()"></select>
                    </div>
                    <div>
                        <label>ޖުޒު:</label>
                        <select id="juzSelect" onchange="fetchJuz()"><option value="">ޖުޒުއެއް...</option></select>
                    </div>
                </div>
                <div id="quranDisplay" class="q-text">
                    <p style="text-align:center; color:#bbb; margin-top:100px; font-size:26px;">ފެށުމަށް ސޫރަތެއް ނަންގަވާ!</p>
                </div>
            </div>

            <div class="side-panel" id="grammar-panel">
                <div class="panel-title">📖 އިޢުރާބާއި ޤަވާޢިދު</div>
                <div id="grammarContainer" style="flex:1;"></div>
                <div class="btn-group">
                    <button class="btn-clear" onclick="document.getElementById('grammarContainer').innerHTML=''">ކްލިއަރ</button>
                    <button class="btn-print" onclick="window.print()">ޕްރިންޓް 🖨️</button>
                </div>
            </div>
        </div>
    </div>

<script>
    /* --- ⚙️ Core Configuration ⚙️ --- */
    const API_KEY = "AIzaSyDECMf2IRvpNhdDnuNQlrHNp9dlHg8I8vA"; 
    let quranCache = [];
    let clickTimer = null;

    /* --- 🔐 License Authentication 🔐 --- */
    function verifyLicense() {
        const input = document.getElementById('licenseKey').value.trim();
        const msg = document.getElementById('secMsg');
        if(!input) { msg.innerText = "Please enter your license key."; return; }

        try {
            const decoded = atob(input);
            if(!decoded.startsWith("ROYAL_EXP_")) throw "E";
            const parts = decoded.split("_");
            if(new Date() > new Date(parts[2])) { msg.innerText = "LICENSE EXPIRED!"; return; }
            
            document.getElementById('securityOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('securityOverlay').style.display = 'none';
                document.getElementById('mainApp').style.display = (window.innerWidth <= 1024) ? 'block' : 'flex';
                document.getElementById('licUser').innerText = "User: " + parts[4].replace(/-/g, ' ');
            }, 600);
            
            initApp();
        } catch(e) { msg.innerText = "INVALID KEY!"; }
    }

    /* --- 🧠 AI Analysis Engine 🧠 --- */
    async function askAI(prompt) {
        const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;
        try {
            const res = await fetch(endpoint, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            if(!res.ok) return `⚠️ API Error: ${data.error.message}`;
            return data.candidates[0].content.parts[0].text;
        } catch(e) { return "⚠️ މައްސަލައެއް ދިމާވެއްޖެ. އިންޓަނެޓް ޗެކްކޮށްލައްވާ."; }
    }

    /* --- 📖 Quran Data Logic --- */
    async function initApp() {
        const juzDropdown = document.getElementById('juzSelect');
        for(let i=1; i<=30; i++) juzDropdown.innerHTML += `<option value="${i}">ޖުޒު ${i}</option>`;
        try {
            const res = await fetch('https://api.alquran.cloud/v1/quran/quran-uthmani');
            const json = await res.json();
            quranCache = json.data.surahs;
            const sDropdown = document.getElementById('surahSelect');
            sDropdown.innerHTML = '<option value="">ސޫރަތެއް ނަންގަވާ...</option>';
            quranCache.forEach(s => { sDropdown.innerHTML += `<option value="${s.number}">${s.number}. ${s.name}</option>`; });
        } catch(e) { alert("Network Error! Refresh page."); }
    }

    function fetchSurah() {
        const val = document.getElementById('surahSelect').value;
        if(val) renderQuran(quranCache[val-1].ayahs, quranCache[val-1].name);
    }

    async function fetchJuz() {
        const j = document.getElementById('juzSelect').value;
        if(!j) return;
        document.getElementById('quranDisplay').innerHTML = '<p style="text-align:center;">ލޯޑުވަނީ... ⏳</p>';
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/juz/${j}/quran-uthmani`);
            const json = await res.json();
            renderQuran(json.data.ayahs);
        } catch(e) { document.getElementById('quranDisplay').innerHTML = '<p style="color:red; text-align:center;">Error!</p>'; }
    }

    function renderQuran(ayahs, sPrefix = "") {
        const display = document.getElementById('quranDisplay');
        display.innerHTML = ayahs.map(a => {
            const sn = a.surah ? a.surah.name : sPrefix;
            const words = a.text.split(' ').map(w => `<span class="q-word" data-sn="${sn}" data-an="${a.numberInSurah}">${w}</span>`).join(' ');
            return `<span>${words} <b class="ayah-num">(${a.numberInSurah})</b> </span>`;
        }).join('');

        document.querySelectorAll('.q-word').forEach(el => {
            el.onclick = function() {
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => handleAnalysis(this, 'single'), 300);
            };
            el.ondblclick = function() {
                clearTimeout(clickTimer);
                handleAnalysis(this, 'double');
            };
        });
    }

    /* --- 📊 Smart Analysis Implementation --- */
    async function handleAnalysis(element, type) {
        const id = 'e' + Date.now();
        const word = element.innerText;
        const sName = element.dataset.sn;
        const aNum = element.dataset.an;

        if(type === 'single') {
            addEntryCard('grammarContainer', id, `إِعْرَاب: ${word}`, element, 'gemini-box');
            const prompt = `Explain the Arabic I'rab of the word '${word}' in Surah ${sName}, Ayah ${aNum}. Provide Arabic explanation first, then English summary, and finally Dhivehi translation. Use HTML <b> tags.`;
            const response = await askAI(prompt);
            updateEntryCard(id, response.replace(/\n/g, '<br>'));
            if(window.innerWidth <= 1024) document.getElementById('grammar-panel').scrollIntoView({behavior:'smooth'});
        } else {
            addEntryCard('sentencesContainer', id, `މާނައާއި ޖުމްލަ: ${word}`, element, 'sentence-box');
            const prompt = `For the word '${word}': 1. Arabic meaning. 2. English/Dhivehi meaning. 3. 5 simple Arabic sentences and 5 intermediate sentences with English and Dhivehi translations. Use HTML.`;
            const response = await askAI(prompt);
            updateEntryCard(id, response.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'));
            if(window.innerWidth <= 1024) document.getElementById('sentences-panel').scrollIntoView({behavior:'smooth'});
        }
    }

    function addEntryCard(containerId, entryId, title, element, boxClass) {
        const div = document.createElement('div');
        div.className = `rep-entry ${boxClass}`;
        div.id = entryId;
        div.innerHTML = `
            <div style="font-weight:bold; border-bottom:1px solid #eee; padding-bottom:10px; color:var(--royal-blue); font-size:18px;">✨ ${title}</div>
            <div class="dhivehi-sharah" id="${entryId}-content">ޝަރަޙަ ހޯދަނީ... ⏳</div>
            <div class="meta-footer"><span>📍 ${element.dataset.sn || '-'}</span> <span>Ayah: ${element.dataset.an || '-'}</span></div>
        `;
        document.getElementById(containerId).prepend(div);
    }

    function updateEntryCard(id, html) {
        const box = document.getElementById(id + '-content');
        if(box) box.innerHTML = html;
    }

    /* --- ✨ Floating Feature --- */
    document.addEventListener('selectionchange', () => {
        const selection = window.getSelection();
        const btn = document.getElementById('floating-search-btn');
        if(selection.rangeCount > 0 && selection.toString().trim().length > 3 && document.getElementById('quranDisplay').contains(selection.anchorNode)) {
            const rect = selection.getRangeAt(0).getBoundingClientRect();
            btn.style.display = 'block';
            btn.style.top = (rect.top + window.scrollY - 60) + 'px';
            btn.style.left = '50%';
            btn.dataset.text = selection.toString().trim();
        } else { btn.style.display = 'none'; }
    });

    document.getElementById('floating-search-btn').onclick = async function() {
        const id = 'e' + Date.now();
        addEntryCard('grammarContainer', id, `ޝަރަޙަ: Selected`, {dataset:{}}, 'gemini-box');
        this.style.display = 'none';
        const prompt = `Analyze this text: '${this.dataset.text}'. 1. Full Arabic I'rab. 2. English notes. 3. Dhivehi grammar explanation. Use HTML.`;
        const response = await askAI(prompt);
        updateEntryCard(id, response.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'));
        if(window.innerWidth <= 1024) document.getElementById('grammar-panel').scrollIntoView({behavior:'smooth'});
    };

    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>
</body>
</html>
