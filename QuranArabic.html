<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ރަސްފަހި ޤުރްއާން އިން ޢަރަބި ދަސްކުރުން - Mobile Edition</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
        
        /* ފޮންޓް ލޯޑްކުރުން - ލޯކަލް ފޯލްޑަރ ނުވަތަ އޮންލައިން ސަރވަރ އިން */
        @font-face { 
            font-family: 'Faruma'; 
            src: url('fonts/faruma.ttf') format('truetype'),
                 url('https://siyamex.github.io/dhivehifont/Faruma.ttf') format('truetype'); 
            font-weight: normal; font-style: normal; font-display: swap;
        }

        :root {
            --royal-blue: #001a4d;
            --royal-dark: #000c24;
            --royal-green: #063d25;
            --royal-gold: #d4af37;
            --gold-gradient: linear-gradient(145deg, #d4af37, #f2d06b, #aa8a2e);
            --bg-light: #fdfbf7;
            
            --gemini-bg: #e3f2fd;
            --gemini-border: #1565c0;
        }

        /* --- އާންމު ސެކިއުރިޓީ: ޓެކްސްޓް ކޮޕީކުރުން ހުއްޓުވުން --- */
        * { 
            box-sizing: border-box; 
            transition: all 0.2s ease; 
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* ޤުރްއާން ބަޔާއި އިންޕުޓްތަކުން ޓެކްސްޓް ސެލެކްޓް ކުރެވޭގޮތް ހެދުން */
        .q-text *, input, textarea, select {
            -webkit-user-select: text !important;
            -khtml-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }
        
        body, html { 
            height: 100vh; margin: 0; padding: 0; 
            font-family: 'Faruma', Arial, sans-serif !important; 
            background: var(--royal-dark); overflow: hidden; /* މުޅި ޕޭޖް ސްކްރޯލް ވުން ހުއްޓުވުން */
        }
        
        input, select, button, .action-btn { font-family: 'Faruma', Arial, sans-serif !important; }

        /* --- LOCK SCREEN STYLES --- */
        #lock-screen {
            position: fixed; inset: 0;
            background: radial-gradient(circle, var(--royal-blue) 0%, #000 100%);
            display: flex; justify-content: center; align-items: center; 
            z-index: 99999; padding: 20px;
        }

        .lock-card {
            background: rgba(255, 255, 255, 0.98); padding: 40px 30px; 
            border-radius: 30px; border: 6px solid var(--royal-gold);
            text-align: center; width: 100%; max-width: 450px; 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            direction: ltr; 
        }

        /* --- MAIN APP STYLES --- */
        .royal-wrapper { height: 100vh; display: none; flex-direction: column; background: var(--bg-light); overflow: hidden; }

        header { background: var(--royal-blue); color: var(--royal-gold); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid var(--royal-gold); flex-wrap: wrap; gap: 10px; z-index: 100; flex-shrink: 0; }
        .header-title { margin: 0; font-size: 22px; text-align: center; flex: 1; direction: rtl;}
        .license-tag { background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 30px; border: 1px solid var(--royal-gold); font-size: 12px; color: #fff; display: flex; align-items: center; }

        /* --- 3 COLUMN LAYOUT (Desktop) --- */
        .main-container { display: flex; flex: 1; overflow: hidden; flex-direction: row; direction: rtl; }

        .side-panel { width: 350px; background: var(--bg-light); overflow-y: auto; padding: 15px; flex-shrink: 0; display: flex; flex-direction: column; }
        .right-panel { border-left: 2px solid #ddd; }
        .left-panel { border-right: 2px solid #ddd; }
        .quran-panel { flex: 1; overflow-y: auto; padding: 20px; background: #fff; position: relative; }

        .search-area { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 20px; }
        .q-text { font-family: 'Amiri', serif; font-size: 36px; line-height: 2.5; text-align: justify; direction: rtl; color: #1a1a1a; padding-bottom: 100px; }
        .q-word { cursor: pointer; padding: 0 4px; border-radius: 6px; display: inline-block; }
        .q-word:hover, .q-word:active { background: rgba(212, 175, 55, 0.2); }

        #floating-search-btn { display: none; position: fixed; z-index: 10000; background: var(--gemini-border); color: white; border: 2px solid #fff; padding: 12px 20px; border-radius: 30px; font-weight: bold; font-size: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); cursor: pointer; transform: translateX(-50%); animation: popUp 0.3s ease-out; }
        @keyframes popUp { 0% { opacity: 0; transform: translate(-50%, 15px); } 100% { opacity: 1; transform: translate(-50%, 0); } }

        .report-header { background: #fff; border: 3px solid var(--royal-gold); padding: 12px; border-radius: 10px; margin-bottom: 15px; text-align: center; font-size: 18px; color: var(--royal-blue); font-weight: bold; }
        
        .rep-entry { padding: 15px; border-radius: 10px; margin-bottom: 12px; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
        
        .gemini-box { border-right: 8px solid var(--gemini-border); background: var(--gemini-bg); }
        .sentence-box { border-right: 8px solid var(--royal-green); background: #e8f5e9; }
        
        .muta-match-content { background: white; border: 1px solid #e2e8f0; padding: 12px; border-radius: 8px; margin-top: 8px; font-family: 'Amiri', serif; font-size: 20px; line-height: 1.6; color: #2d3436; text-align: right;}
        .dhivehi-sharah { font-family: 'Faruma', Arial, sans-serif !important; font-size: 15px; direction: rtl; color: #333; margin-top: 10px; line-height: 1.8; text-align: right;}
        .muta-meta-data { display: block; font-size: 12px; color: #666; margin-top: 8px; padding-top: 6px; border-top: 1px dashed #ced4da; font-weight: bold; text-align: right; }

        .action-btn { padding: 10px; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; width: 100%; margin-bottom: 8px; text-transform: uppercase;}
        input, select { padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; width: 100%; margin-bottom: 8px; }
        input:focus { border-color: var(--royal-gold); outline: none; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; padding-top: 15px; }

        /* --- MOBILE & TABLET RESPONSIVENESS (ސްކްރީނަށް ފިޓްކުރުން) --- */
        @media (max-width: 1024px) {
            header { padding: 10px; }
            .header-title { font-size: 18px; }
            .main-container { flex-direction: column; }
            
            /* މޯބައިލްގައި ޕެނަލްތައް ސްކްރީނަށް ފިޓްވާވަރަށް ހެދުން އަދި އެތެރެއިން ސްކްރޯލް ވުން */
            .quran-panel { height: 45vh; flex: none; border-bottom: 4px solid #ddd; padding: 15px; }
            .side-panel { height: 35vh; width: 100% !important; flex: none; border: none !important; border-bottom: 4px solid #ddd !important; padding: 15px; }
            
            .search-area { grid-template-columns: 1fr; gap: 8px; padding: 12px; margin-bottom: 15px; }
            .q-text { font-size: 30px; line-height: 2.3; }
        }

        /* --- PRINT & PDF OPTIMIZATION --- */
        @media print {
            body, html { height: auto !important; overflow: visible !important; background: #fff !important; }
            #lock-screen, header, .search-area, .quran-panel, .action-btn, .button-group, #floating-search-btn { display: none !important; }
            .royal-wrapper { height: auto !important; display: block !important; }
            .main-container { display: block !important; flex-direction: column !important; }
            .side-panel { width: 100% !important; border: none !important; margin: 0 !important; padding: 0 !important; height: auto !important; overflow: visible !important; }
            .rep-entry { box-shadow: none !important; border: 1px solid #ccc !important; break-inside: avoid; page-break-inside: avoid; }
            .hide-for-print { display: none !important; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <button id="floating-search-btn" style="font-family:'Faruma', Arial, sans-serif !important;">✨ ޖެމިނައި މެދުވެރިކޮށް ޝަރަޙަކުރޭ</button>

    <div id="lock-screen">
        <div class="lock-card">
            <h1 style="font-family: Arial, sans-serif; color:var(--royal-blue); margin:0; font-size:26px; font-weight:900;">ROYAL AI CLOUD</h1>
            <p style="font-family: Arial, sans-serif; font-weight:bold; color:var(--royal-gold); font-size:14px; margin:10px 0 20px;">Software Activation required</p>
            
            <input type="password" id="licenseInput" placeholder="Enter License Key here..." style="text-align:center; font-family: monospace !important; font-size: 14px;">
            
            <button class="action-btn" style="background:var(--royal-blue); color:white; font-family: Arial, sans-serif !important;" onclick="verifyLicense()">Unlock Software 🔓</button>
            <p id="licError" style="color:red; font-weight:bold; margin-top:10px; font-size:13px; font-family:'Faruma', Arial, sans-serif;"></p>
        </div>
    </div>

    <div class="royal-wrapper" id="mainApp">
        <header>
            <div class="license-tag">
                <span id="licTag" style="font-family: Arial, sans-serif;">User: Validating...</span>
            </div>
            <h1 class="header-title">ޤުރްއާނާއެކު ޢަރަބި ބަސް</h1>
            <div style="font-weight:bold; color:#fff; font-size:11px; text-transform:uppercase; font-family: Arial, sans-serif;">Pro Edition</div>
        </header>

        <div class="main-container">
            
            <div class="side-panel right-panel" id="sentences-panel">
                <div class="report-header">📝 މާނައާއި ޖުމްލަތައް</div>
                
                <div id="sentencesContainer" style="flex:1;"></div>

                <div class="button-group">
                    <button class="action-btn" style="background:#e0e0e0; color:#333;" onclick="document.getElementById('sentencesContainer').innerHTML=''">ކްލިއަރ 🧹</button>
                    <button class="action-btn" style="background:var(--royal-green); color:white;" onclick="printSection('sentences-panel')">ޕްރިންޓް / PDF 🖨️</button>
                </div>
            </div>

            <div class="quran-panel" id="quran-panel">
                <div class="search-area">
                    <div style="text-align: right;">
                        <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:5px;">ދަރިވަރުގެ ނަން ނުވަތަ އައިޑީ:</label>
                        <input type="text" id="stuName" placeholder="ދަރިވަރުގެ ނަން..." style="font-family:'Faruma', Arial, sans-serif !important; direction: rtl;">
                    </div>
                    <div style="text-align: right;">
                        <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:5px;">ސޫރަތް:</label>
                        <select id="surahSelect" onchange="window.fetchSurah();" style="font-family:'Faruma', Arial, sans-serif !important; direction: rtl;"></select>
                    </div>
                    <div style="text-align: right;">
                        <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:5px;">ފޮތް (ޖުޒު):</label>
                        <select id="juzSelect" onchange="window.fetchJuz();" style="font-family:'Faruma', Arial, sans-serif !important; direction: rtl;">
                            <option value="">ފޮތެއް ނަންގަވާ</option>
                        </select>
                    </div>
                </div>

                <div id="quranDisplay" class="q-text">
                    <p style="text-align:center; color:#ccc; margin-top:80px; font-size:22px; font-family:'Faruma', Arial, sans-serif !important;">ކިޔަވަން ފެށުމަށް ސޫރަތެއް ނުވަތަ ފޮތެއް ނަންގަވާ!</p>
                </div>
            </div>

            <div class="side-panel left-panel" id="grammar-panel">
                <div class="report-header">📖 އިޢުރާބާއި ޤަވާޢިދު</div>
                
                <div id="grammarContainer" style="flex:1;"></div>

                <div class="button-group">
                    <button class="action-btn" style="background:#e0e0e0; color:#333;" onclick="document.getElementById('grammarContainer').innerHTML=''">ކްލިއަރ 🧹</button>
                    <button class="action-btn" style="background:var(--royal-blue); color:white;" onclick="printSection('grammar-panel')">ޕްރިންޓް / PDF 🖨️</button>
                </div>
            </div>

        </div>
    </div>

<script>
    // --- SECURITY ANTI-COPY SCRIPT ---
    // Right-click disable
    document.addEventListener('contextmenu', event => event.preventDefault()); 
    // Keyboard shortcuts disable
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false; // F12
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) return false; // Ctrl+S
        if (e.ctrlKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+C 
            // Allow Ctrl+C ONLY if user is selecting text inside the Quran panel
            if(!window.getSelection().toString()) return false;
        }
    }

    // --- API KEY CONFIGURATION ---
    const GEMINI_API_KEY = "AIzaSyDj7k1Cuh2SnqT2lT-aCnXlcuozCCfRYrg"; 
    
    // --- VARIABLES ---
    let quranFullData = [];
    let clickTimer = null;

    // --- LICENSE VERIFICATION LOGIC ---
    function verifyLicense() {
        const key = document.getElementById('licenseInput').value.trim();
        const err = document.getElementById('licError');
        
        if(!key) {
            err.innerText = "ކީ ޖައްސަވާ!";
            return;
        }

        try {
            const decoded = atob(key); 
            if(!decoded.startsWith("ROYAL_EXP_")) { throw "Invalid format"; }
            
            const parts = decoded.split("_");
            const expDateStr = parts[2];
            const custName = parts[4];
            
            const expDate = new Date(expDateStr);
            const today = new Date();
            
            if(today > expDate) {
                err.innerText = "ލައިސަންސް ކީ ގެ މުއްދަތު ވަނީ ހަމަވެފައި!";
                return;
            }
            
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('licTag').innerText = `Licensed to: ${custName.replace(/-/g, ' ')}`;
            
            initApp();
            
        } catch(e) {
            err.innerText = "ލައިސަންސް ކީ ކަމަކުނުދޭ! ސައްޙަ ކީއެއް ޖައްސަވާ.";
        }
    }

    // --- PRINT / PDF LOGIC ---
    function printSection(panelId) {
        const sentencesPanel = document.getElementById('sentences-panel');
        const grammarPanel = document.getElementById('grammar-panel');
        
        if (panelId === 'sentences-panel') {
            grammarPanel.classList.add('hide-for-print');
            sentencesPanel.classList.remove('hide-for-print');
        } else {
            sentencesPanel.classList.add('hide-for-print');
            grammarPanel.classList.remove('hide-for-print');
        }

        window.print();

        setTimeout(() => {
            sentencesPanel.classList.remove('hide-for-print');
            grammarPanel.classList.remove('hide-for-print');
        }, 1000);
    }

    // --- GEMINI API CALLER ---
    async function askGemini(promptText) {
        if(!GEMINI_API_KEY || GEMINI_API_KEY === "") {
            return "ޖެމިނައި އޭޕީއައި ކީ ސެޓަޕް ކުރެވިފައެއް ނުވޭ.";
        }
        
        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: promptText }] }]
                })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (error) {
            return "ޖެމިނައި އިން މަޢުލޫމާތު ގެނައުމުގައި މައްސަލައެއް ދިމާވެއްޖެ. އިންޓަނެޓް ކަނެކްޝަން ޗެކްކުރައްވާ.";
        }
    }

    // --- APP INIT ---
    async function initApp() {
        const juzSel = document.getElementById('juzSelect');
        for (let i = 1; i <= 30; i++) juzSel.innerHTML += `<option value="${i}">ފޮތް ${i}</option>`;

        try {
            const res = await fetch('https://api.alquran.cloud/v1/quran/quran-uthmani');
            const json = await res.json();
            quranFullData = json.data.surahs;
            
            const sel = document.getElementById('surahSelect');
            sel.innerHTML = '<option value="">ސޫރަތެއް ނަންގަވާ</option>';
            quranFullData.forEach(s => {
                sel.innerHTML += `<option value="${s.number}">${s.number}. ${s.name}</option>`;
            });
        } catch(e) { alert("API އިން މައުލޫމާތު ނުލިބުނު! އިންޓަނެޓް ކަނެކްޝަން ޗެކްކޮށްލައްވާ."); }
    }

    // --- QURAN RENDER ---
    window.fetchSurah = () => {
        const val = document.getElementById('surahSelect').value;
        if(!val) return;
        document.getElementById('juzSelect').value = "";
        const s = quranFullData[val-1];
        renderQuran(s.ayahs, s.name);
    };

    window.fetchJuz = async () => {
        const juzNum = document.getElementById('juzSelect').value;
        if (!juzNum) return;
        document.getElementById('surahSelect').value = "";
        const display = document.getElementById('quranDisplay');
        display.innerHTML = '<p style="text-align:center; color:var(--royal-gold); margin-top:100px;">ފޮތް ލޯޑްވަނީ... ⏳</p>';
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/juz/${juzNum}/quran-uthmani`);
            const json = await res.json();
            renderQuran(json.data.ayahs);
        } catch(e) { display.innerHTML = '<p style="color:red; text-align:center;">މައްސަލައެއް ދިމާވެއްޖެ!</p>'; }
    };

    function renderQuran(ayahs, parentSurahName = "") {
        const display = document.getElementById('quranDisplay');
        
        display.innerHTML = ayahs.map(a => {
            const sName = a.surah ? a.surah.name : parentSurahName;
            const words = a.text.split(' ').map(word => 
                `<span class="q-word" 
                       data-sname="${sName}" 
                       data-anum="${a.numberInSurah}" 
                       data-juz="${a.juz || ''}" 
                       data-page="${a.page || ''}">${word}</span>`
            ).join(' ');
            
            return `<div style="display:inline;">
                        ${words} 
                        <span style="color:var(--royal-gold); font-weight:bold; font-size:26px; margin: 0 8px;">(${a.numberInSurah})</span>
                    </div>`;
        }).join(' ');

        document.querySelectorAll('.q-word').forEach(el => {
            el.addEventListener('click', function(e) {
                if (window.getSelection().toString().length > 0) return;
                
                if (e.detail === 1 || e.type === 'click') { 
                    clearTimeout(clickTimer);
                    clickTimer = setTimeout(() => {
                        handleSingleClickAnalysis(this);
                    }, 300);
                }
            });

            el.addEventListener('dblclick', function(e) {
                clearTimeout(clickTimer);
                handleDoubleClickAnalysis(this);
            });
        });
    }

    // --- AI ANALYSIS FUNCTIONS ---

    // 1. Single Click -> Left Panel (Grammar / I'rab)
    async function handleSingleClickAnalysis(element) {
        const word = element.innerText;
        const sName = element.getAttribute('data-sname');
        const aNum = element.getAttribute('data-anum');
        
        const entryId = 'entry_' + Date.now();
        createSidebarEntry('grammarContainer', entryId, `إِعْرَاب (I'rab) : ${word}`, element, true, 'gemini-box', '--gemini-border');

        const prompt = `What is the grammatical position (I'rab) of the word '${word}' in Surah ${sName}, Ayah ${aNum}? Reply very briefly in Arabic.`;
        
        const answer = await askGemini(prompt);
        updateSidebarEntry(entryId, answer);
    }

    // 2. Double Click -> Right Panel (Meaning & Sentences)
    async function handleDoubleClickAnalysis(element) {
        const word = element.innerText;
        
        const entryId = 'entry_' + Date.now();
        createSidebarEntry('sentencesContainer', entryId, `މާނައާއި ޖުމްލަ : ${word}`, element, true, 'sentence-box', '--royal-green');

        const prompt = `For the Arabic word '${word}': 
        1. Give its meaning in Arabic. 
        2. Give its meaning in Dhivehi language. 
        3. Provide 5 simple Arabic sentences using this word with their Dhivehi translation.
        Format cleanly with HTML tags. Do not use asterisks.`;
        
        const answer = await askGemini(prompt);
        const htmlAnswer = answer.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        updateSidebarEntry(entryId, htmlAnswer);
    }

    // 3. Selection -> Left Panel (Full I'rab & Dhivehi Rules)
    document.addEventListener('selectionchange', () => {
        const selection = window.getSelection();
        const btn = document.getElementById('floating-search-btn');
        
        if(selection.rangeCount > 0 && selection.toString().trim().length > 2) {
            const node = selection.anchorNode;
            if(node && document.getElementById('quranDisplay').contains(node)) {
                const range = selection.getRangeAt(0);
                const rect = range.getBoundingClientRect();
                
                btn.style.display = 'block';
                btn.style.top = Math.max(10, rect.top - 60) + 'px';
                btn.style.left = '50%'; 
                
                btn.dataset.text = selection.toString().trim();
                
                let metaEl = node.nodeType === 3 ? node.parentElement : node;
                if(metaEl.classList && metaEl.classList.contains('q-word')) {
                    btn.dataset.sname = metaEl.getAttribute('data-sname');
                    btn.dataset.anum = metaEl.getAttribute('data-anum');
                    btn.dataset.juz = metaEl.getAttribute('data-juz');
                    btn.dataset.page = metaEl.getAttribute('data-page');
                }
            } else { btn.style.display = 'none'; }
        } else { btn.style.display = 'none'; }
    });

    // Touch support for floating button on mobile
    document.getElementById('floating-search-btn').addEventListener('touchstart', triggerSelectionSearch);
    document.getElementById('floating-search-btn').addEventListener('click', triggerSelectionSearch);

    async function triggerSelectionSearch(e) {
        e.preventDefault();
        const btn = document.getElementById('floating-search-btn');
        const text = btn.dataset.text;
        
        const mockEl = document.createElement('span');
        mockEl.setAttribute('data-sname', btn.dataset.sname || '-');
        mockEl.setAttribute('data-anum', btn.dataset.anum || '-');
        mockEl.setAttribute('data-juz', btn.dataset.juz || '-');
        mockEl.setAttribute('data-page', btn.dataset.page || '-');

        const entryId = 'entry_' + Date.now();
        createSidebarEntry('grammarContainer', entryId, `ފުރިހަމަ އިޢުރާބާއި ޤަވާޢިދު: ${text}`, mockEl, true, 'gemini-box', '--gemini-border');
        
        window.getSelection().removeAllRanges();
        btn.style.display = 'none';

        const prompt = `Analyze the following Arabic text from the Quran: '${text}'. 
        1. Provide the full Arabic I'rab breakdown. 
        2. Translate the I'rab explanation to Dhivehi language. 
        3. Explain each grammar rule used here separately in Dhivehi language.
        Format cleanly with HTML tags. Do not use asterisks.`;
        
        const answer = await askGemini(prompt);
        const htmlAnswer = answer.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
        updateSidebarEntry(entryId, htmlAnswer);
    }

    // --- UI HELPER FUNCTIONS ---
    function createSidebarEntry(containerId, id, title, element, isLoading, boxClass, colorVar) {
        const sName = element.getAttribute('data-sname') || '-';
        const aNum = element.getAttribute('data-anum') || '-';
        const juzNum = element.getAttribute('data-juz') || '-';
        const pageNum = element.getAttribute('data-page') || '-';

        const entry = document.createElement('div');
        entry.className = `rep-entry ${boxClass}`;
        entry.id = id;
        
        entry.innerHTML = `
            <div style="font-weight:bold; color:var(${colorVar}); border-bottom:2px solid rgba(0,0,0,0.1); padding-bottom:8px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;">
                <span style="font-size:16px; font-family:'Faruma', Arial, sans-serif;">✨ ${title}</span>
            </div>
            <div class="muta-match-content dhivehi-sharah" id="${id}-content">
                ${isLoading ? '<div class="loader"></div> ޖެމިނައި އިން މަޢުލޫމާތު ހޯދަނީ...' : ''}
            </div>
            <div class="muta-meta-data">📍 ސޫރަތް: ${sName} | އާޔަތް: ${aNum} | ފޮތް: ${juzNum} | ޞަފުޙާ: ${pageNum}</div>
        `;
        
        document.getElementById(containerId).prepend(entry);
    }

    function updateSidebarEntry(id, content) {
        const contentBox = document.getElementById(`${id}-content`);
        if(contentBox) {
            contentBox.innerHTML = content;
        }
    }
</script>
</body>
</html>
