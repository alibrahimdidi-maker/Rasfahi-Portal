<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ޤުރްއާނުން ޢަރަބިބަސް ދަސްކުރުން - Learn Arabic from Quran</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@700;900&display=swap');
        
        /* ފަރުމާ ފޮންޓް */
        @font-face { 
            font-family: 'Faruma'; 
            src: url('fonts/faruma.ttf') format('truetype'),
                 url('https://siyamex.github.io/dhivehifont/Faruma.ttf') format('truetype'); 
            font-display: swap;
        }

        :root {
            --royal-blue: #001a4d;
            --royal-dark: #000c24;
            --royal-gold: #d4af37;
            --gold-gradient: linear-gradient(145deg, #d4af37, #f2d06b, #aa8a2e);
            --bg-light: #fdfbf7;
            --gemini-border: #1565c0;
            --green-border: #2e7d32;
        }

        /* ސެކިއުރިޓީ */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; font-family: 'Faruma', Arial, sans-serif !important; background: var(--royal-dark); user-select: none; -webkit-user-select: none; }
        
        .q-text *, input, select, .dhivehi-sharah { user-select: text !important; -webkit-user-select: text !important; }

        /* --- ލޮގިން ސްކްރީން --- */
        #lock-screen {
            position: fixed; inset: 0; background: radial-gradient(circle, var(--royal-blue) 0%, #000 100%);
            display: flex; justify-content: center; align-items: center; z-index: 99999; padding: 20px;
        }
        .lock-card {
            background: rgba(255, 255, 255, 0.98); padding: 40px 30px; border-radius: 30px;
            border: 6px solid var(--royal-gold); text-align: center; width: 100%; max-width: 450px;
            box-shadow: 0 0 80px rgba(212, 175, 55, 0.5);
        }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--royal-gold); margin-bottom: 20px; }

        /* --- މައި އެޕްލިކޭޝަން --- */
        .royal-wrapper { height: 100vh; display: none; flex-direction: column; background: var(--bg-light); overflow: hidden; }
        
        header { 
            background: var(--royal-blue); color: var(--royal-gold); padding: 12px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 4px solid var(--royal-gold); flex-shrink: 0;
        }
        .header-title { margin: 0; font-size: 20px; text-align: center; flex: 1; direction: rtl; }

        .main-container { display: flex; flex: 1; overflow: hidden; direction: rtl; }

        /* ޕެނަލްތައް */
        .side-panel { 
            width: 360px; background: #f4f1ea; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; border-left: 1px solid #ddd; border-right: 1px solid #ddd; 
        }
        .quran-panel { flex: 1; overflow-y: auto; padding: 20px; background: #fff; }

        .search-area { 
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; 
            background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 20px;
        }
        input, select { 
            width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; 
            font-size: 14px; font-family: 'Faruma' !important; text-align: right;
        }

        /* ޤުރްއާން ޓެކްސްޓް */
        .q-text { 
            font-family: 'Amiri', serif; font-size: 38px; line-height: 2.6; 
            text-align: justify; color: #1a1a1a; direction: rtl; padding-bottom: 150px;
        }
        .q-word { cursor: pointer; padding: 0 4px; border-radius: 6px; display: inline-block; transition: 0.2s; }
        .q-word:hover { background: rgba(212, 175, 55, 0.2); }

        /* ރިޕޯޓް ގޮޅިތައް */
        .rep-entry { 
            padding: 15px; border-radius: 12px; margin-bottom: 15px; background: #fff; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 10px solid #ccc;
        }
        .gemini-box { border-right-color: var(--gemini-border); background: #eef6ff; }
        .sentence-box { border-right-color: var(--green-border); background: #f1f8f1; }
        
        .dhivehi-sharah { font-size: 16px; line-height: 1.8; color: #222; margin-top: 10px; text-align: right; }
        .muta-meta-data { font-size: 12px; color: #666; border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 5px; text-align: left; }

        .action-btn { 
            padding: 12px; border-radius: 8px; border: none; font-weight: bold; 
            cursor: pointer; width: 100%; margin-bottom: 10px; font-family: 'Faruma' !important;
        }

        #floating-search-btn { 
            display: none; position: fixed; z-index: 1000; background: var(--gemini-border); 
            color: #fff; padding: 12px 25px; border-radius: 30px; font-weight: bold; 
            border: 2px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* --- މޯބައިލް ސެޓިންގްސް --- */
        @media (max-width: 1024px) {
            .main-container { flex-direction: column; overflow-y: auto; height: auto; }
            .side-panel { width: 100%; height: auto; min-height: 400px; border: none; border-top: 4px solid #ddd; overflow-y: visible; }
            .quran-panel { height: 55vh; min-height: 450px; overflow-y: auto; border-bottom: 4px solid #ddd; }
            .search-area { grid-template-columns: 1fr; }
            .header-title { font-size: 16px; }
            .q-text { font-size: 32px; line-height: 2.3; }
        }

        @media print {
            .quran-panel, #lock-screen, header, .action-btn, .search-area, #floating-search-btn { display: none !important; }
            .side-panel { width: 100% !important; height: auto !important; }
            .rep-entry { break-inside: avoid; border: 1px solid #ccc !important; }
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <button id="floating-search-btn">✨ ޖެމިނައި ޝަރަޙަ</button>

    <div id="lock-screen">
        <div class="lock-card">
            <img src="https://via.placeholder.com/100/001a4d/d4af37?text=Quran+AI" class="profile-img">
            <h1 style="font-family:'Cinzel', serif; color:var(--royal-blue); margin:0; font-size:28px;">ROYAL AI CLOUD</h1>
            <p style="font-weight:bold; color:var(--royal-gold); font-size:16px; margin:10px 0 25px;">ޤުރްއާނުން ޢަރަބިބަސް ދަސްކުރުން</p>
            <input type="password" id="licenseInput" placeholder="Enter License Key..." style="text-align:center; direction: ltr;">
            <button class="action-btn" style="background:var(--royal-blue); color:#fff; margin-top:15px;" onclick="verifyLicense()">ACTIVATE SYSTEM 🔓</button>
            <p id="licError" style="color:red; font-size:13px; margin-top:10px; font-weight: bold;"></p>
        </div>
    </div>

    <div class="royal-wrapper" id="mainApp">
        <header>
            <div style="font-size:11px; color:#fff; background:rgba(0,0,0,0.2); padding:5px 12px; border-radius:20px; border:1px solid var(--royal-gold);">
                <span id="licTag">User: ...</span>
            </div>
            <h1 class="header-title">ޤުރްއާނުން ޢަރަބިބަސް ދަސްކުރުން - Learn Arabic from Quran</h1>
            <div style="font-weight:bold; color:#fff; font-size:11px; text-transform:uppercase; font-family: Arial;">AI PRO v2.5</div>
        </header>

        <div class="main-container">
            <div class="side-panel" id="sentences-panel">
                <div class="report-header">📝 މާނައާއި ޖުމްލަތައް</div>
                <div id="sentencesContainer" style="flex:1;"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <button class="action-btn" style="background:#ddd; color:#333;" onclick="document.getElementById('sentencesContainer').innerHTML=''">ކްލިއަރ</button>
                    <button class="action-btn" style="background:var(--royal-gold); color:var(--royal-dark);" onclick="window.print()">ޕްރިންޓް 🖨️</button>
                </div>
            </div>

            <div class="quran-panel" id="quran-panel">
                <div class="search-area">
                    <div>
                        <label style="font-size:12px; font-weight:bold;">ދަރިވަރު:</label>
                        <input type="text" id="stuName" placeholder="ނަން...">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold;">ސޫރަތް:</label>
                        <select id="surahSelect" onchange="fetchSurah()"></select>
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold;">ޖުޒު:</label>
                        <select id="juzSelect" onchange="fetchJuz()"><option value="">ޚިޔާރުކުރައްވާ...</option></select>
                    </div>
                </div>
                <div id="quranDisplay" class="q-text">
                    <p style="text-align:center; color:#999; margin-top:80px;">ފެށުމަށް ސޫރަތެއް ނުވަތަ ޖުޒުއެއް ނަންގަވާ!</p>
                </div>
            </div>

            <div class="side-panel" id="grammar-panel">
                <div class="report-header">📖 އިޢުރާބާއި ޤަވާޢިދު</div>
                <div id="grammarContainer" style="flex:1;"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <button class="action-btn" style="background:#ddd; color:#333;" onclick="document.getElementById('grammarContainer').innerHTML=''">ކްލިއަރ</button>
                    <button class="action-btn" style="background:var(--royal-blue); color:#fff;" onclick="window.print()">ޕްރިންޓް 🖨️</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const API_KEY = "AIzaSyCySzBeIDtSA1w0GF21pUjfaip6rfD1RFE";
    let qData = [];
    let clickTimer = null;

    // ސެކިއުރިޓީ
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    // ލައިސަންސް ވެރިފިކޭޝަން
    function verifyLicense() {
        const input = document.getElementById('licenseInput').value.trim();
        if(!input) { document.getElementById('licError').innerText = "ކީ ޖައްސަވާ!"; return; }
        try {
            const decoded = atob(input);
            if(!decoded.startsWith("ROYAL_EXP_")) throw "E";
            const parts = decoded.split("_");
            if(new Date() > new Date(parts[2])) { document.getElementById('licError').innerText = "ލައިސަންސް މުއްދަތު ހަމަވެއްޖެ!"; return; }
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            document.getElementById('licTag').innerText = parts[4].replace(/-/g, ' ');
            initApp();
        } catch(e) { document.getElementById('licError').innerText = "ސައްޙަ ކީއެއް ނޫން!"; }
    }

    // AI އާ ގުޅުން
    async function askAI(prompt) {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;
        try {
            const res = await fetch(url, {
                method: "POST", headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            if(!res.ok) return `⚠️ API Error: ${data.error.message}`;
            return data.candidates[0].content.parts[0].text;
        } catch(e) { return "⚠️ ކަނެކްޝަން މައްސަލައެއް!"; }
    }

    async function initApp() {
        const jSel = document.getElementById('juzSelect');
        for(let i=1; i<=30; i++) jSel.innerHTML += `<option value="${i}">ޖުޒު ${i}</option>`;
        try {
            const res = await fetch('https://api.alquran.cloud/v1/quran/quran-uthmani');
            const json = await res.json();
            qData = json.data.surahs;
            const sSel = document.getElementById('surahSelect');
            sSel.innerHTML = '<option value="">ސޫރަތެއް...</option>';
            qData.forEach(s => { sSel.innerHTML += `<option value="${s.number}">${s.number}. ${s.name}</option>`; });
        } catch(e) { alert("ޤުރްއާން ލޯޑްކުރުމުގައި މައްސަލައެއް!"); }
    }

    function fetchSurah() {
        const v = document.getElementById('surahSelect').value;
        if(v) renderQuran(qData[v-1].ayahs, qData[v-1].name);
    }

    async function fetchJuz() {
        const j = document.getElementById('juzSelect').value;
        if(!j) return;
        document.getElementById('quranDisplay').innerHTML = '<p style="text-align:center;">ލޯޑުވަނީ... ⏳</p>';
        const res = await fetch(`https://api.alquran.cloud/v1/juz/${j}/quran-uthmani`);
        const json = await res.json();
        renderQuran(json.data.ayahs);
    }

    function renderQuran(ayahs, sPrefix = "") {
        const div = document.getElementById('quranDisplay');
        div.innerHTML = ayahs.map(a => {
            const sn = a.surah ? a.surah.name : sPrefix;
            const words = a.text.split(' ').map(w => `<span class="q-word" data-sn="${sn}" data-an="${a.numberInSurah}">${w}</span>`).join(' ');
            return `<span>${words} <b style="color:var(--royal-gold); font-size:22px;">(${a.numberInSurah})</b> </span>`;
        }).join('');

        document.querySelectorAll('.q-word').forEach(el => {
            el.onclick = function() {
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => handleAnalysis(this, 'single'), 300);
            };
            el.ondblclick = function() {
                clearTimeout(clickTimer);
                handleAnalysis(this, 'double');
            };
        });
    }

    async function handleAnalysis(el, type) {
        const id = 'e' + Date.now();
        const word = el.innerText;
        if(type === 'single') {
            addEntry('grammarContainer', id, `އިޢުރާބު: ${word}`, el, 'gemini-box');
            const p = `Explain the Arabic I'rab of the word '${word}' in Surah ${el.dataset.sn}, Ayah ${el.dataset.an} briefly in Arabic.`;
            updateEntry(id, await askAI(p));
        } else {
            addEntry('sentencesContainer', id, `މާނައާއި ޖުމްލަ: ${word}`, el, 'sentence-box');
            const p = `Word: '${word}'. 1. Arabic/Dhivehi Meaning. 2. Provide 5 simple Arabic sentences (Level 1) with Dhivehi translation. 3. Provide 5 intermediate Arabic sentences (Level 2) with Dhivehi translation. Use HTML <b> tags.`;
            const a = await askAI(p);
            updateEntry(id, a.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<b>$1</b>'));
        }
        if(window.innerWidth <= 1024) document.getElementById(type === 'single' ? 'grammar-panel' : 'sentences-panel').scrollIntoView({behavior:'smooth'});
    }

    // Highlight Analysis
    document.addEventListener('selectionchange', () => {
        const s = window.getSelection();
        const b = document.getElementById('floating-search-btn');
        if(s.rangeCount > 0 && s.toString().trim().length > 3 && document.getElementById('quranDisplay').contains(s.anchorNode)) {
            const r = s.getRangeAt(0).getBoundingClientRect();
            b.style.display = 'block'; b.style.top = (r.top + window.scrollY - 55) + 'px'; b.style.left = '50%';
            b.dataset.text = s.toString().trim();
        } else { b.style.display = 'none'; }
    });

    document.getElementById('floating-search-btn').onclick = async function() {
        const id = 'e' + Date.now();
        addEntry('grammarContainer', id, `ޝަރަޙަ: ${this.dataset.text}`, {dataset:{}}, 'gemini-box');
        const p = `Analyze this Quranic text: '${this.dataset.text}'. 1. Full Arabic I'rab. 2. Dhivehi translation. 3. Detailed grammar rules in Dhivehi. Use HTML.`;
        this.style.display = 'none';
        updateEntry(id, await askAI(p));
        if(window.innerWidth <= 1024) document.getElementById('grammar-panel').scrollIntoView({behavior:'smooth'});
    };

    function addEntry(con, id, title, el, cls) {
        const d = document.createElement('div');
        d.className = `rep-entry ${cls}`; d.id = id;
        d.innerHTML = `<div style="font-weight:bold; border-bottom:1px solid #eee; padding-bottom:5px; color:var(--royal-blue);">${title}</div>
            <div class="dhivehi-sharah" id="${id}-c">ލޯޑުވަނީ... ⏳</div>
            <div class="muta-meta-data">${el.dataset.sn || '-'} | އާޔަތް: ${el.dataset.an || '-'}</div>`;
        document.getElementById(con).prepend(d);
    }
    function updateEntry(id, h) { document.getElementById(id+'-c').innerHTML = h; }
</script>
</body>
</html>
