<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް - Grand Edition v14</title>
    
    <style>
        /* =========================================================
           1. CORE SYSTEM FONTS & ASSETS
        ========================================================= */
        @font-face {
            font-family: 'Faruma';
            src: url('fonts/faruma.ttf') format('truetype'),
                 url('fonts/Faruma.woff') format('woff');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap');

        :root {
            --royal-navy: #000c24;
            --royal-blue: #001a4d;
            --royal-accent: #003366;
            --gold-primary: #d4af37;
            --gold-light: #f2d06b;
            --gold-dark: #aa8a2e;
            --gold-gradient: linear-gradient(145deg, #d4af37, #f2d06b, #aa8a2e);
            --emerald: #063d25;
            --ruby: #8b0000;
            --bg-cream: #fdfbf7;
            --white: #ffffff;
            --shadow-soft: 0 4px 15px rgba(0,0,0,0.1);
            --shadow-hard: 0 10px 40px rgba(0,0,0,0.4);
            --radius-lg: 30px;
            --radius-md: 15px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* =========================================================
           2. GLOBAL RESET & BASE STYLES
        ========================================================= */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Faruma', 'Thaana Keyboard', sans-serif;
            background: var(--royal-navy);
            overflow: hidden;
            color: #333;
        }

        button { cursor: pointer; border: none; font-family: 'Faruma'; }

        /* =========================================================
           3. SECURITY GATEWAY (LOCK SCREEN)
        ========================================================= */
        #gatekeeper {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--royal-blue) 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
            transition: opacity 0.8s ease;
        }

        .auth-container {
            background: var(--white);
            padding: 60px 40px;
            border-radius: var(--radius-lg);
            border: 12px solid var(--gold-primary);
            width: 95%;
            max-width: 520px;
            text-align: center;
            box-shadow: var(--shadow-hard);
            animation: authPop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes authPop {
            0% { transform: scale(0.8) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .admin-profile {
            width: 160px;
            height: 160px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 8px solid var(--gold-primary);
            overflow: hidden;
            background: #eee;
            box-shadow: 0 0 30px rgba(212,175,55,0.4);
        }

        .admin-profile img { width: 100%; height: 100%; object-fit: cover; }

        .system-branding h2 {
            font-family: 'Cinzel', serif;
            color: var(--royal-blue);
            font-size: 28px;
            margin: 0;
            letter-spacing: 3px;
        }

        .pass-field {
            margin-top: 40px;
            width: 100%;
        }

        .pass-field input {
            width: 100%;
            padding: 20px;
            border-radius: var(--radius-md);
            border: 3px solid #eee;
            text-align: center;
            font-size: 18px;
            background: #f9f9f9;
            transition: var(--transition);
        }

        .pass-field input:focus { border-color: var(--gold-primary); background: #fff; }

        .unlock-btn {
            width: 100%;
            padding: 22px;
            margin-top: 20px;
            border-radius: var(--radius-md);
            background: var(--gold-gradient);
            font-weight: 900;
            font-size: 20px;
            color: var(--royal-navy);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        /* =========================================================
           4. MAIN INTERFACE LAYOUT
        ========================================================= */
        #appShell {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: var(--bg-cream);
            border: 15px solid var(--gold-primary);
            position: relative;
        }

        header {
            background: var(--royal-blue);
            color: var(--gold-primary);
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 8px solid var(--gold-primary);
            box-shadow: 0 5px 25px rgba(0,0,0,0.4);
        }

        .header-left h1 { margin: 0; font-size: 32px; text-shadow: 2px 2px 0 rgba(0,0,0,0.5); }
        .license-box {
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--gold-primary);
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 14px;
            color: #fff;
            font-weight: bold;
        }

        .viewport { display: flex; flex: 1; overflow: hidden; flex-direction: column; }

        /* =========================================================
           5. PANEL SYSTEMS (SIDEBARS & CENTER)
        ========================================================= */
        .panel { padding: 30px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        /* --- Marks Sidebar (Right/Top) --- */
        .rubric-sidebar {
            background: var(--royal-blue);
            width: 100%;
            order: 3;
            color: #fff;
            border-top: 8px solid var(--gold-primary);
        }

        .rubric-item {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            transition: var(--transition);
        }

        .rubric-item:hover { background: rgba(255,255,255,0.1); border-color: var(--gold-primary); }

        .rubric-meta { display: flex; justify-content: space-between; font-weight: bold; font-size: 20px; margin-bottom: 15px; color: var(--gold-primary); }

        .control-row { display: flex; gap: 10px; }
        .mark-btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 16px;
            transition: var(--transition);
        }
        .mark-btn:active { transform: scale(0.92); }
        .m-1 { background: #ff4d4d; color: white; }
        .m-05 { background: #ffa64d; color: white; }
        .m-025 { background: #ffdb4d; color: #444; }

        /* --- Total Display --- */
        .master-score {
            background: var(--gold-gradient);
            padding: 40px 20px;
            border-radius: 25px;
            text-align: center;
            color: var(--royal-navy);
            margin: 30px 0;
            border: 5px solid #fff;
            box-shadow: var(--shadow-hard);
        }
        .master-score span { font-size: 14px; font-weight: bold; display: block; margin-bottom: 5px; }
        .master-score .big-num { font-size: 80px; font-weight: 900; line-height: 1; }

        /* --- Quran Center Panel --- */
        .quran-area { flex: 2; order: 1; background: #fff; border-bottom: 2px solid #ddd; padding: 40px; }
        .q-search {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: #f4f4f4;
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 40px;
            border: 1px solid #eee;
        }

        .q-content {
            font-family: 'Amiri', serif;
            font-size: 38px;
            line-height: 2.8;
            text-align: justify;
            direction: rtl;
            color: #1a1a1a;
            user-select: text;
        }

        .ayah-block {
            cursor: pointer;
            padding: 5px 8px;
            border-radius: 10px;
            transition: background 0.2s;
            display: inline;
        }
        .ayah-block:hover { background: rgba(212,175,55,0.1); }
        .ayah-sign { color: var(--gold-primary); font-weight: bold; font-size: 24px; margin: 0 15px; }

        /* --- Report Panel --- */
        .report-area {
            flex: 1.5;
            order: 2;
            background: var(--bg-cream);
            border-left: 4px solid #eee;
        }

        .summary-card {
            background: #fff;
            padding: 35px;
            border-radius: 25px;
            border: 6px solid var(--gold-primary);
            box-shadow: var(--shadow-soft);
            margin-bottom: 35px;
            line-height: 2;
        }

        .log-list { display: flex; flex-direction: column; gap: 15px; }
        .log-card {
            padding: 22px;
            border-radius: 20px;
            background: #fff;
            border: 1px solid #eee;
            position: relative;
            animation: slideIn 0.4s ease-out;
            box-shadow: 0 5px 10px rgba(0,0,0,0.03);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(30px); } }

        .log-muta { border-right: 12px solid var(--emerald); background: #fafffa; }
        .log-err { border-right: 12px solid var(--ruby); background: #fffafa; }

        .log-card h4 { margin: 0 0 10px 0; font-size: 18px; }
        .log-txt { font-family: 'Amiri', serif; font-size: 22px; color: #222; margin-bottom: 10px; }
        .log-meta { font-size: 12px; color: #777; font-weight: bold; border-top: 1px solid #f0f0f0; padding-top: 10px; }

        /* =========================================================
           6. INTERACTIVE ELEMENTS & UTILS
        ========================================================= */
        input, select {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 3px solid #eee;
            font-family: 'Faruma';
            font-size: 17px;
            background: #fff;
        }
        
        input:focus { border-color: var(--gold-primary); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .full-btn {
            width: 100%;
            padding: 22px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 800;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #fs-trigger {
            position: fixed;
            bottom: 40px;
            left: 40px;
            width: 80px;
            height: 80px;
            background: var(--gold-gradient);
            border-radius: 50%;
            border: 6px solid var(--royal-blue);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: var(--shadow-hard);
        }

        /* =========================================================
           7. DESKTOP ADAPTIVE LAYOUT
        ========================================================= */
        @media (min-width: 1024px) {
            .viewport { flex-direction: row; }
            .rubric-sidebar { width: 420px; order: 1; border-top: none; border-left: 10px solid var(--gold-primary); }
            .quran-area { order: 2; border-bottom: none; }
            .report-area { width: 550px; order: 3; }
        }

        /* =========================================================
           8. PRINT ENGINE
        ========================================================= */
        @media print {
            #fs-trigger, header, .rubric-sidebar, .q-search, .action-grid, #reset-trigger { display: none !important; }
            #appShell { border: none !important; display: block !important; }
            .viewport { display: block !important; }
            .quran-area { display: none !important; }
            .report-area { width: 100% !important; border: none !important; }
            .summary-card { border: 2px solid #000 !important; margin-bottom: 50px; }
            .log-card { border: 1px solid #000 !important; break-inside: avoid; margin-bottom: 20px; }
            #signature-row { display: flex !important; justify-content: space-around; margin-top: 150px; }
        }

        #signature-row { display: none; }
        .sig-box { border-top: 2px solid #000; width: 200px; padding-top: 10px; font-weight: bold; text-align: center; }

    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="auth-container">
            <div class="admin-profile">
                <img src="images/ali.png" alt="System Admin">
            </div>
            <div class="system-branding">
                <h2>ROYAL QURAN v14</h2>
                <p style="color:var(--gold-primary); font-weight:bold; margin-top:10px; font-size:18px;">ޤުރްއާން ޙިފްޡް ރެކޯޑް ސޮފްޓްވެއަރ</p>
            </div>
            <div class="pass-field">
                <input type="password" id="sysKey" placeholder="ލައިސަންސް ކޯޑް ޖައްސަވާ">
                <button class="unlock-btn" onclick="verifyAccess()">ސިސްޓަމް ހުޅުވާލާ 🔑</button>
                <p id="authMsg" style="color:#ff4d4d; font-weight:bold; margin-top:20px; min-height:25px;"></p>
            </div>
        </div>
    </div>

    <div id="appShell">
        <header>
            <div class="header-left">
                <h1>ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް</h1>
            </div>
            <div class="license-box" id="licUser">Licence: ---</div>
        </header>

        <div class="viewport">
            <div class="panel rubric-sidebar">
                <div style="background:var(--emerald); padding:15px; border-radius:15px; text-align:center; font-weight:bold; margin-bottom:25px; border:1px solid var(--gold-primary);">މާކްސް ރުބްރިކް</div>
                
                <div id="rubric-items-container">
                    </div>

                <div class="master-score">
                    <span>Final Calculated Score</span>
                    <div id="grand-total" class="big-num">100.00</div>
                </div>

                <button id="reset-trigger" class="full-btn" style="background:#b71c1c; color:white; border:none;" onclick="hardReset()">އާ ދަރިވަރަކަށް ރީސެޓް ކުރައްވާ 🔄</button>
            </div>

            <div class="panel quran-area">
                <div class="q-search">
                    <div>
                        <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:8px;">ދަރިވަރުގެ ނަން:</label>
                        <input type="text" id="nameIn" placeholder="ނަން ލިޔުއްވާ..." oninput="syncSummary()">
                    </div>
                    <div>
                        <label style="font-size:13px; font-weight:bold; display:block; margin-bottom:8px;">ކިޔަވާ ސޫރަތް:</label>
                        <select id="surahIn" onchange="renderQuran()"></select>
                    </div>
                </div>

                <div id="qDisplay" class="q-content" onmouseup="processSelection()" ontouchend="processSelection()">
                    <p style="text-align:center; color:#ccc; margin-top:200px; font-size:26px;">ސޫރަތެއް ނެންގެވުމުން އާޔަތްތައް ފެންނާނެއެވެ.</p>
                </div>
            </div>

            <div class="panel report-area">
                <div style="background:var(--emerald); padding:15px; border-radius:15px; text-align:center; font-weight:bold; margin-bottom:25px; color:var(--gold-primary); border:1px solid var(--gold-primary);">އިމްތިޙާން ރިޕޯޓް</div>
                
                <div class="summary-card" id="sumView">
                    </div>

                <div id="log-anchor" class="log-list">
                    </div>

                <div id="signature-row">
                    <div class="sig-box">ޖަޖު 1 ގެ ސޮއި</div>
                    <div class="sig-box">ޖަޖު 2 ގެ ސޮއި</div>
                    <div class="sig-box">ޖަޖު 3 ގެ ސޮއި</div>
                </div>

                <div class="action-grid">
                    <button class="full-btn" style="background:var(--emerald); color:white;" onclick="saveSession(true)">ސޭވް ކުރައްވާ 💾</button>
                    <button class="full-btn" style="background:var(--gold-gradient); color:var(--royal-navy);" onclick="window.print()">ޕްރިންޓް ރިޕޯޓް 🖨️</button>
                </div>
            </div>
        </div>

        <div id="fs-trigger" onclick="toggleFS()">👑</div>
    </div>

<script>
    /* =========================================================
       CORE LOGIC ENGINE
    ========================================================= */
    const MARKS_CONFIG = { "ކިޔެވުން": 50, "ތަޖުވީދު": 20, "މަޚްރަޖު": 10, "ޞިފަ": 10, "ފަޞާޙާ": 5, "ތަލައްފުޡް": 5 };
    let liveMarks = {...MARKS_CONFIG};
    let qData = [];
    let clickTracker = 0;

    // --- SECURITY PROTOCOL ---
    function verifyAccess() {
        const key = document.getElementById('sysKey').value.trim();
        const msg = document.getElementById('authMsg');
        try {
            const dec = atob(key);
            if (dec.startsWith("ROYAL_EXP_")) {
                const parts = dec.split("_CUST_");
                const exp = new Date(parts[0].replace("ROYAL_EXP_", ""));
                if (exp >= new Date()) {
                    const user = parts[1] || "Valued Customer";
                    localStorage.setItem('rf_v14_auth', 'true');
                    localStorage.setItem('rf_v14_user', user);
                    initApp(user);
                } else { msg.innerText = "ލައިސަންސްގެ މުއްދަތު ހަމަވެއްޖެ!"; }
            } else { msg.innerText = "ނުބައި ކޯޑެއް! އަލުން މަސައްކަތް ކުރައްވާ."; }
        } catch(e) { msg.innerText = "ސައްޙަ ނޫން ކޯޑެއް!"; }
    }

    function initApp(user) {
        document.getElementById('gatekeeper').style.display = 'none';
        document.getElementById('appShell').style.display = 'flex';
        document.getElementById('licUser').innerText = "Licence: " + user;
        setupUI();
    }

    // --- INTERFACE BUILDER ---
    function setupUI() {
        const container = document.getElementById('rubric-items-container');
        container.innerHTML = '';
        for (let k in MARKS_CONFIG) {
            container.innerHTML += `
                <div class="rubric-item">
                    <div class="rubric-meta"><span>${k}</span><span id="score-${k}">${liveMarks[k]}</span></div>
                    <div class="control-row">
                        <button class="mark-btn m-1" onclick="modifyMark('${k}', 1)">-1</button>
                        <button class="mark-btn m-05" onclick="modifyMark('${k}', 0.5)">-0.5</button>
                        <button class="mark-btn m-025" onclick="modifyMark('${k}', 0.25)">-0.25</button>
                    </div>
                </div>`;
        }

        fetch('https://api.alquran.cloud/v1/surah').then(r => r.json()).then(d => {
            qData = d.data;
            const select = document.getElementById('surahIn');
            select.innerHTML = '<option value="">ސޫރަތެއް ނަންގަވާ</option>';
            qData.forEach(s => {
                let o = document.createElement('option');
                o.value = s.number;
                o.innerText = `${s.number}. ${s.name} (${s.englishName})`;
                select.appendChild(o);
            });
            restoreSession();
        });
    }

    // --- QURAN CORE ---
    async function renderQuran() {
        const val = document.getElementById('surahIn').value;
        if (!val) return;
        const view = document.getElementById('qDisplay');
        view.innerHTML = '<p style="text-align:center; padding-top:100px;">ލޯޑް ވަނީ...</p>';
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${val}/editions/quran-uthmani`);
        const json = await res.json();
        const surah = json.data[0];
        view.innerHTML = surah.ayahs.map(a => `
            <span class="ayah-block" 
                  data-s="${surah.name}" 
                  data-a="${a.numberInSurah}" 
                  data-p="${a.page}" 
                  data-j="${a.juz}"
                  onclick="handleQuickAction(this)">${a.text}</span>
            <span class="ayah-sign">(${a.numberInSurah})</span>
        `).join(' ');
        syncSummary();
        saveSession();
    }

    // --- FAST INTERACTION ENGINE ---
    function processSelection() {
        const sel = window.getSelection().toString().trim();
        if (sel.length > 4) {
            const range = window.getSelection().getRangeAt(0);
            const parent = range.startContainer.parentElement;
            if (parent.classList.contains('ayah-block')) {
                logToReport('muta', sel, parent.dataset);
                window.getSelection().removeAllRanges();
            }
        }
    }

    function handleQuickAction(el) {
        const now = Date.now();
        if (now - clickTracker < 300) { 
            logToReport('err', el.innerText.substring(0,40)+'...', el.dataset); 
            modifyMark('ކިޔެވުން', 1);
        }
        clickTracker = now;
    }

    // --- CALCULATION & REPORTING ---
    function modifyMark(key, val) {
        liveMarks[key] = Math.max(0, liveMarks[key] - val);
        document.getElementById(`score-${key}`).innerText = liveMarks[key];
        let total = 0; for (let k in liveMarks) total += liveMarks[k];
        document.getElementById('grand-total').innerText = total.toFixed(2);
        syncSummary();
        saveSession();
    }

    function logToReport(type, content, meta) {
        const anchor = document.getElementById('log-anchor');
        const card = document.createElement('div');
        card.className = `log-card ${type === 'muta' ? 'log-muta' : 'log-err'}`;
        card.innerHTML = `
            <h4 style="color:${type === 'muta' ? 'var(--emerald)' : 'var(--ruby)'}">
                ${type === 'muta' ? 'މުތަޝާބިހް ފާހަގަކުރެވިފައި' : 'ކިޔެވުމުގެ ކުށް'}
            </h4>
            <div class="log-txt">"${content}"</div>
            <div class="log-meta">📍 ${meta.s} (އާޔަތް: ${meta.a}) | ޞަފްޙާ: ${meta.p} | ފޮތް: ${meta.j}</div>
        `;
        anchor.prepend(card);
        saveSession();
    }

    function syncSummary() {
        const n = document.getElementById('nameIn').value || "................";
        const s = document.getElementById('surahIn').options[document.getElementById('surahIn').selectedIndex]?.text || "....";
        const t = document.getElementById('grand-total').innerText;
        document.getElementById('sumView').innerHTML = `
            <div style="font-size:20px;"><b>ދަރިވަރު:</b> ${n}</div>
            <div style="font-size:18px; margin:10px 0;"><b>ސޫރަތް:</b> ${s}</div>
            <div style="font-size:28px; color:var(--emerald); font-weight:900; border-top:3px solid #eee; padding-top:15px; margin-top:15px;">
                ޖުމްލަ ނަތީޖާ: ${t} / 100
            </div>`;
    }

    // --- DATA RECOVERY ---
    function saveSession(manual = false) {
        const data = {
            marks: liveMarks,
            name: document.getElementById('nameIn').value,
            surah: document.getElementById('surahIn').value,
            logs: document.getElementById('log-anchor').innerHTML
        };
        localStorage.setItem('rf_v14_data', JSON.stringify(data));
        if (manual) alert("މަޢުލޫމާތު ރައްކާކުރެވިއްޖެ! ✅");
    }

    function restoreSession() {
        const raw = localStorage.getItem('rf_v14_data');
        if (!raw) return;
        const d = JSON.parse(raw);
        liveMarks = d.marks;
        document.getElementById('nameIn').value = d.name || "";
        document.getElementById('log-anchor').innerHTML = d.logs || "";
        for (let k in liveMarks) {
            const el = document.getElementById(`score-${k}`);
            if(el) el.innerText = liveMarks[k];
        }
        let total = 0; for (let k in liveMarks) total += liveMarks[k];
        document.getElementById('grand-total').innerText = total.toFixed(2);
        if (d.surah) { document.getElementById('surahIn').value = d.surah; renderQuran(); }
        syncSummary();
    }

    function hardReset() {
        if (confirm("ހުރިހާ ރެކޯޑެއް ފޮހެލާ އާ ދަރިވަރަކަށް ރީސެޓް ކުރަންވީތޯ؟")) {
            localStorage.removeItem('rf_v14_data');
            location.reload();
        }
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    window.onload = () => {
        if (localStorage.getItem('rf_v14_auth') === 'true') initApp(localStorage.getItem('rf_v14_user'));
    };
</script>
</body>
</html>
