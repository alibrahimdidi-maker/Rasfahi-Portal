<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް - Grand Edition v14</title>
    
    <style>
        /* =========================================================
           1. CORE SYSTEM FONTS & ASSETS
        ========================================================= */
        @font-face {
            font-family: 'Faruma';
            src: url('fonts/faruma.ttf') format('truetype'),
                 url('fonts/Faruma.woff') format('woff');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap');

        :root {
            --royal-navy: #000c24;
            --royal-blue: #001a4d;
            --royal-accent: #003366;
            --gold-primary: #d4af37;
            --gold-light: #f2d06b;
            --gold-dark: #aa8a2e;
            --gold-gradient: linear-gradient(145deg, #d4af37, #f2d06b, #aa8a2e);
            --emerald: #063d25;
            --ruby: #8b0000;
            --bg-cream: #fdfbf7;
            --white: #ffffff;
            --shadow-soft: 0 4px 15px rgba(0,0,0,0.1);
            --shadow-hard: 0 10px 40px rgba(0,0,0,0.4);
            --radius-lg: 30px;
            --radius-md: 15px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* =========================================================
           2. GLOBAL RESET & BASE STYLES
        ========================================================= */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            -webkit-font-smoothing: antialiased;
        }

        body, html {
            height: 100vh;
            margin: 0;
            padding: 0;
            font-family: 'Faruma', 'Thaana Keyboard', sans-serif;
            background: var(--royal-navy);
            overflow: hidden;
            color: #333;
        }

        button { cursor: pointer; border: none; font-family: 'Faruma'; transition: var(--transition); }

        /* =========================================================
           3. SECURITY GATEWAY (LOCK SCREEN)
        ========================================================= */
        #gatekeeper {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at center, var(--royal-blue) 0%, #000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999999;
        }

        .auth-container {
            background: var(--white);
            padding: 60px 40px;
            border-radius: var(--radius-lg);
            border: 12px solid var(--gold-primary);
            width: 95%;
            max-width: 520px;
            text-align: center;
            box-shadow: var(--shadow-hard);
            animation: authPop 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes authPop {
            0% { transform: scale(0.8) translateY(50px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .admin-profile {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            border-radius: 50%;
            border: 6px solid var(--gold-primary);
            overflow: hidden;
            background: #eee;
            box-shadow: 0 0 30px rgba(212,175,55,0.4);
        }

        .admin-profile img { width: 100%; height: 100%; object-fit: cover; }

        .system-branding h2 {
            font-family: 'Cinzel', serif;
            color: var(--royal-blue);
            font-size: 28px;
            margin: 0;
            letter-spacing: 3px;
        }

        .pass-field { margin-top: 30px; width: 100%; }
        .pass-field input {
            width: 100%;
            padding: 18px;
            border-radius: var(--radius-md);
            border: 3px solid #eee;
            text-align: center;
            font-size: 18px;
            background: #f9f9f9;
        }

        .unlock-btn {
            width: 100%;
            padding: 20px;
            margin-top: 15px;
            border-radius: var(--radius-md);
            background: var(--gold-gradient);
            font-weight: 900;
            font-size: 18px;
            color: var(--royal-navy);
        }

        /* =========================================================
           4. MAIN INTERFACE LAYOUT
        ========================================================= */
        #appShell {
            display: none;
            height: 100vh;
            flex-direction: column;
            background: var(--bg-cream);
            border: 15px solid var(--gold-primary);
            position: relative;
        }

        header {
            background: var(--royal-blue);
            color: var(--gold-primary);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 6px solid var(--gold-primary);
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        .header-left h1 { margin: 0; font-size: 28px; }

        .license-box {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--gold-primary);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            color: #fff;
        }

        .viewport { display: flex; flex: 1; overflow: hidden; }

        /* =========================================================
           5. PANEL SYSTEMS
        ========================================================= */
        .panel { padding: 25px; overflow-y: auto; }

        /* --- Rubric Sidebar --- */
        .rubric-sidebar {
            width: 380px;
            background: var(--royal-blue);
            color: #fff;
            border-left: 8px solid var(--gold-primary);
            display: flex;
            flex-direction: column;
        }

        .rubric-item {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .rubric-meta { display: flex; justify-content: space-between; font-weight: bold; font-size: 18px; margin-bottom: 12px; color: var(--gold-primary); }

        .control-row { display: flex; gap: 8px; }
        .mark-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 14px;
            color: white;
        }
        .m-1 { background: #ff4d4d; }
        .m-05 { background: #ffa64d; }
        .m-025 { background: #ffdb4d; color: #333; }

        .master-score {
            background: var(--gold-gradient);
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            color: var(--royal-navy);
            margin: 20px 0;
            border: 4px solid #fff;
        }
        .master-score .big-num { font-size: 60px; font-weight: 900; line-height: 1; }

        /* --- Quran Area --- */
        .quran-area { flex: 2; background: #fff; border-left: 2px solid #ddd; }
        .q-search {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #f8f8f8;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            border: 1px solid #eee;
        }

        .q-content {
            font-family: 'Amiri', serif;
            font-size: 34px;
            line-height: 2.8;
            text-align: justify;
            direction: rtl;
            color: #1a1a1a;
        }

        .ayah-block {
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            transition: 0.2s;
            display: inline;
        }
        .ayah-block:hover { background: rgba(212,175,55,0.15); }
        .ayah-sign { color: var(--gold-primary); font-weight: bold; font-size: 22px; margin: 0 10px; }

        /* --- Report Area --- */
        .report-area { width: 480px; background: var(--bg-cream); }
        .summary-card {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            border: 5px solid var(--gold-primary);
            box-shadow: var(--shadow-soft);
            margin-bottom: 25px;
        }

        .log-list { display: flex; flex-direction: column; gap: 12px; }
        .log-card {
            padding: 18px;
            border-radius: 15px;
            background: #fff;
            border: 1px solid #eee;
            animation: slideIn 0.3s ease-out;
            position: relative;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } }

        .log-muta { border-right: 10px solid var(--emerald); background: #fafffa; }
        .log-err { border-right: 10px solid var(--ruby); background: #fffafa; }

        .log-card h4 { margin: 0 0 8px 0; font-size: 16px; }
        .log-txt { font-family: 'Amiri', serif; font-size: 20px; color: #222; margin-bottom: 10px; }
        
        .mutashabih-detail {
            font-size: 13px;
            background: rgba(0,0,0,0.03);
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            border: 1px dashed #ccc;
        }
        .mutashabih-detail ul { margin: 5px 0 0 0; padding-right: 20px; }
        .mutashabih-detail li { margin-bottom: 4px; color: #555; }

        /* =========================================================
           6. UTILS & BUTTONS
        ========================================================= */
        input, select {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #eee;
            font-family: 'Faruma'; font-size: 16px;
        }
        input:focus { border-color: var(--gold-primary); }

        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
        .full-btn {
            width: 100%; padding: 18px; border-radius: 15px; font-size: 16px; font-weight: 800;
        }

        #fs-trigger {
            position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px;
            background: var(--gold-gradient); border-radius: 50%; border: 4px solid var(--royal-blue);
            z-index: 999; display: flex; align-items: center; justify-content: center; font-size: 25px;
        }

        /* =========================================================
           7. PRINT ENGINE
        ========================================================= */
        @media print {
            #fs-trigger, header, .rubric-sidebar, .q-search, .action-grid, #reset-trigger { display: none !important; }
            #appShell { border: none !important; display: block !important; }
            .viewport { display: block !important; }
            .quran-area { display: none !important; }
            .report-area { width: 100% !important; border: none !important; padding: 0 !important; }
            .summary-card { border: 2px solid #000 !important; }
            .log-card { border: 1px solid #000 !important; break-inside: avoid; }
            #sig-row { display: flex !important; justify-content: space-around; margin-top: 80px; }
        }
        #sig-row { display: none; }
        .sig-box { border-top: 1px solid #000; width: 180px; text-align: center; padding-top: 10px; font-weight: bold; }

    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="auth-container">
            <div class="admin-profile">
                <img src="https://via.placeholder.com/150/001a4d/d4af37?text=ROYAL+QC" alt="Admin">
            </div>
            <div class="system-branding">
                <h2>ROYAL QURAN v14</h2>
                <p style="color:var(--gold-primary); font-weight:bold; margin-top:10px;">ޤުރްއާން ޙިފްޡް ރެކޯޑް ސިސްޓަމް</p>
            </div>
            <div class="pass-field">
                <input type="password" id="sysKey" placeholder="ލައިސަންސް ކޯޑް ޖައްސަވާ">
                <button class="unlock-btn" onclick="verifyAccess()">ސިސްޓަމް ހުޅުވާލާ 🔑</button>
                <p id="authMsg" style="color:#ff4d4d; font-weight:bold; margin-top:15px; min-height:20px;"></p>
            </div>
        </div>
    </div>

    <div id="appShell">
        <header>
            <div class="header-left"><h1>ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް</h1></div>
            <div class="license-box" id="licUser">Licence: Checking...</div>
        </header>

        <div class="viewport">
            <div class="panel rubric-sidebar">
                <div style="background:var(--emerald); padding:12px; border-radius:12px; text-align:center; font-weight:bold; margin-bottom:20px; border:1px solid var(--gold-primary);">މާކްސް ރުބްރިކް</div>
                
                <div id="rubric-container"></div>

                <div class="master-score">
                    <span style="font-weight:bold; font-size:14px; display:block; margin-bottom:5px;">TOTAL SCORE</span>
                    <div id="grand-total" class="big-num">100.00</div>
                </div>

                <button id="reset-trigger" class="full-btn" style="background:#b71c1c; color:white;" onclick="hardReset()">އާ ދަރިވަރަކަށް ރީސެޓް 🔄</button>
            </div>

            <div class="panel quran-area">
                <div class="q-search">
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">ދަރިވަރުގެ ނަން:</label>
                        <input type="text" id="nameIn" placeholder="ނަން ލިޔުއްވާ..." oninput="syncSummary()">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">ކިޔަވާ ސޫރަތް:</label>
                        <select id="surahIn" onchange="renderQuran()"></select>
                    </div>
                </div>

                <div id="qDisplay" class="q-content" onmouseup="detectMutashabih()">
                    <p style="text-align:center; color:#ccc; margin-top:150px; font-size:22px;">ސޫރަތެއް ނެންގެވުމުން އާޔަތްތައް ފެންނާނެއެވެ.</p>
                </div>
            </div>

            <div class="panel report-area">
                <div style="background:var(--emerald); padding:12px; border-radius:12px; text-align:center; font-weight:bold; margin-bottom:20px; color:var(--gold-primary); border:1px solid var(--gold-primary);">އިމްތިޙާން ރިޕޯޓް</div>
                
                <div class="summary-card" id="sumView"></div>

                <div id="log-anchor" class="log-list"></div>

                <div id="sig-row">
                    <div class="sig-box">ޖަޖު 1 ގެ ސޮއި</div>
                    <div class="sig-box">ޖަޖު 2 ގެ ސޮއި</div>
                    <div class="sig-box">ޖަޖު 3 ގެ ސޮއި</div>
                </div>

                <div class="action-grid">
                    <button class="full-btn" style="background:var(--emerald); color:white;" onclick="saveSession(true)">ސޭވް ކުރައްވާ 💾</button>
                    <button class="full-btn" style="background:var(--gold-gradient); color:var(--royal-navy);" onclick="window.print()">ޕްރިންޓް ރިޕޯޓް 🖨️</button>
                </div>
            </div>
        </div>

        <div id="fs-trigger" onclick="toggleFS()">👑</div>
    </div>

<script>
    /* =========================================================
       CORE LOGIC ENGINE
    ========================================================= */
    const MARKS_CONFIG = { "ކިޔެވުން": 50, "ތަޖުވީދު": 20, "މަޚްރަޖު": 10, "ޞިފަ": 10, "ފަޞާޙާ": 5, "ތަލައްފުޡް": 5 };
    let liveMarks = {...MARKS_CONFIG};
    let clickTracker = 0;

    // --- SECURITY PROTOCOL ---
    function verifyAccess() {
        const key = document.getElementById('sysKey').value.trim();
        const msg = document.getElementById('authMsg');
        
        // Simple Base64 logic or hardcoded for demo. 
        // Example: ROYAL2026 -> Uk9ZQUwyMDI2
        try {
            if (key === "ROYAL2026" || atob(key).includes("ROYAL")) {
                localStorage.setItem('rf_v14_auth', 'true');
                initApp("Authorized User");
            } else { msg.innerText = "ނުބައި ކޯޑެއް! އަލުން މަސައްކަތް ކުރައްވާ."; }
        } catch(e) { msg.innerText = "ސައްޙަ ނޫން ކޯޑެއް!"; }
    }

    function initApp(user) {
        document.getElementById('gatekeeper').style.display = 'none';
        document.getElementById('appShell').style.display = 'flex';
        document.getElementById('licUser').innerText = "Licence: " + user;
        setupUI();
    }

    // --- INTERFACE BUILDER ---
    function setupUI() {
        const container = document.getElementById('rubric-container');
        container.innerHTML = '';
        for (let k in MARKS_CONFIG) {
            container.innerHTML += `
                <div class="rubric-item">
                    <div class="rubric-meta"><span>${k}</span><span id="score-${k}">${liveMarks[k]}</span></div>
                    <div class="control-row">
                        <button class="mark-btn m-1" onclick="modifyMark('${k}', 1)">-1</button>
                        <button class="mark-btn m-05" onclick="modifyMark('${k}', 0.5)">-0.5</button>
                        <button class="mark-btn m-025" onclick="modifyMark('${k}', 0.25)">-0.25</button>
                    </div>
                </div>`;
        }

        fetch('https://api.alquran.cloud/v1/surah').then(r => r.json()).then(d => {
            const select = document.getElementById('surahIn');
            select.innerHTML = '<option value="">ސޫރަތެއް ނަންގަވާ</option>';
            d.data.forEach(s => {
                select.innerHTML += `<option value="${s.number}">${s.number}. ${s.name} (${s.englishName})</option>`;
            });
            restoreSession();
        });
    }

    // --- QURAN RENDERER ---
    async function renderQuran() {
        const val = document.getElementById('surahIn').value;
        if (!val) return;
        const view = document.getElementById('qDisplay');
        view.innerHTML = '<p style="text-align:center; padding-top:100px;">ލޯޑް ވަނީ...</p>';
        
        const res = await fetch(`https://api.alquran.cloud/v1/surah/${val}/editions/quran-uthmani`);
        const json = await res.json();
        const surah = json.data[0];
        
        view.innerHTML = surah.ayahs.map(a => `
            <span class="ayah-block" 
                  data-sname="${surah.name}" 
                  data-anum="${a.numberInSurah}" 
                  data-page="${a.page}" 
                  data-juz="${a.juz}"
                  onclick="quickError(this)">${a.text}</span>
            <span class="ayah-sign">(${a.numberInSurah})</span>
        `).join(' ');
        syncSummary();
    }

    // --- SMART MUTASHABIH ENGINE ---
    async function detectMutashabih() {
        const selection = window.getSelection().toString().trim();
        if (selection.length < 5) return;

        const range = window.getSelection().getRangeAt(0);
        const parent = range.startContainer.parentElement;
        if (!parent.classList.contains('ayah-block')) return;

        const meta = parent.dataset;
        
        // Fetch matches from API
        try {
            const res = await fetch(`https://api.alquran.cloud/v1/search/${selection}/all/quran-uthmani`);
            const json = await res.json();
            const matches = json.data.matches;

            if (matches && matches.length > 0) {
                logToReport('muta', selection, meta, matches);
                window.getSelection().removeAllRanges();
            }
        } catch (err) {
            console.error("Search failed", err);
        }
    }

    function quickError(el) {
        const now = Date.now();
        if (now - clickTracker < 300) { 
            logToReport('err', el.innerText.substring(0, 40) + "...", el.dataset, []);
            modifyMark('ކިޔެވުން', 1);
        }
        clickTracker = now;
    }

    // --- LOGGING & SCORING ---
    function logToReport(type, content, meta, matches) {
        const anchor = document.getElementById('log-anchor');
        const card = document.createElement('div');
        card.className = `log-card ${type === 'muta' ? 'log-muta' : 'log-err'}`;
        
        let matchHTML = "";
        if (type === 'muta' && matches.length > 0) {
            matchHTML = `<div class="mutashabih-detail">
                <b>ތަޝާބުހްވާ އެހެން ތަންތަން:</b>
                <ul>
                    ${matches.slice(0, 5).map(m => `<li>${m.surah.name} (އާޔަތް: ${m.numberInSurah}) - ޞަފްޙާ: ${m.page}</li>`).join('')}
                    ${matches.length > 5 ? `<li>...އަދި އިތުރު ${matches.length - 5} ތަން</li>` : ''}
                </ul>
            </div>`;
        }

        card.innerHTML = `
            <h4 style="color:${type === 'muta' ? 'var(--emerald)' : 'var(--ruby)'}">
                ${type === 'muta' ? 'މުތަޝާބިހް ފާހަގަކުރެވިފައި' : 'ކިޔެވުމުގެ ކުށް'}
            </h4>
            <div class="log-txt">"${content}"</div>
            <div style="font-size:11px; color:#777; font-weight:bold;">
                📍 މިހާރު: ${meta.sname} (އާޔަތް: ${meta.anum}) | ޞަފްޙާ: ${meta.page} | ފޮތް: ${meta.juz}
            </div>
            ${matchHTML}
        `;
        anchor.prepend(card);
        saveSession();
    }

    function modifyMark(key, val) {
        liveMarks[key] = Math.max(0, liveMarks[key] - val);
        document.getElementById(`score-${key}`).innerText = liveMarks[key];
        
        let total = 0;
        for (let k in liveMarks) total += liveMarks[k];
        document.getElementById('grand-total').innerText = total.toFixed(2);
        syncSummary();
        saveSession();
    }

    function syncSummary() {
        const n = document.getElementById('nameIn').value || "................";
        const s = document.getElementById('surahIn').options[document.getElementById('surahIn').selectedIndex]?.text || "....";
        const t = document.getElementById('grand-total').innerText;
        document.getElementById('sumView').innerHTML = `
            <div style="font-size:18px;"><b>ދަރިވަރު:</b> ${n}</div>
            <div style="font-size:16px; margin:8px 0;"><b>ސޫރަތް:</b> ${s}</div>
            <div style="font-size:24px; color:var(--emerald); font-weight:900; border-top:2px solid #eee; padding-top:10px; margin-top:10px;">
                ނަތީޖާ: ${t} / 100
            </div>`;
    }

    // --- DATA MANAGEMENT ---
    function saveSession(manual = false) {
        const data = {
            marks: liveMarks,
            name: document.getElementById('nameIn').value,
            surah: document.getElementById('surahIn').value,
            logs: document.getElementById('log-anchor').innerHTML
        };
        localStorage.setItem('rf_v14_data', JSON.stringify(data));
        if (manual) alert("މަޢުލޫމާތު ރައްކާކުރެވިއްޖެ! ✅");
    }

    function restoreSession() {
        const raw = localStorage.getItem('rf_v14_data');
        if (!raw) return;
        const d = JSON.parse(raw);
        liveMarks = d.marks;
        document.getElementById('nameIn').value = d.name || "";
        document.getElementById('log-anchor').innerHTML = d.logs || "";
        for (let k in liveMarks) {
            const el = document.getElementById(`score-${k}`);
            if(el) el.innerText = liveMarks[k];
        }
        let total = 0; for (let k in liveMarks) total += liveMarks[k];
        document.getElementById('grand-total').innerText = total.toFixed(2);
        if (d.surah) { document.getElementById('surahIn').value = d.surah; renderQuran(); }
        syncSummary();
    }

    function hardReset() {
        if (confirm("ހުރިހާ ރެކޯޑެއް ފޮހެލާ އާ ދަރިވަރަކަށް ރީސެޓް ކުރަންވީތޯ؟")) {
            localStorage.removeItem('rf_v14_data');
            location.reload();
        }
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    window.onload = () => {
        if (localStorage.getItem('rf_v14_auth') === 'true') initApp("Authorized User");
    };

</script>
</body>
</html>
