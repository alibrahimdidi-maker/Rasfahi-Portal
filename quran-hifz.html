<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް ސޮފްޓްވެއަރ</title>
    <style>
        /* Faruma Font Integration */
        @font-face {
            font-family: 'Faruma';
            src: url('fonts/faruma.ttf') format('truetype'),
                 url('fonts/Faruma.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600&display=swap');

        :root { 
            --royal-blue: #001a4d; 
            --royal-dark: #000c24;
            --royal-green: #063d25; 
            --royal-gold: #d4af37; 
            --gold-gradient: linear-gradient(145deg, #d4af37, #f2d06b);
            --bg-light: #fdfbf7;
        }
        
        * { box-sizing: border-box; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100vh; margin: 0; padding: 0; font-family: 'Faruma', sans-serif; background: var(--royal-dark); overflow-x: hidden; }

        /* Welcome Screen Section */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, var(--royal-blue), #000);
            display: flex; justify-content: center; align-items: center; z-index: 9999;
            padding: 20px;
        }
        .lock-card {
            background: rgba(255, 255, 255, 0.98); padding: 40px; border-radius: 30px; border: 6px solid var(--royal-gold);
            text-align: center; width: 100%; max-width: 500px; box-shadow: 0 0 70px rgba(212, 175, 55, 0.5);
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .profile-img { 
            width: 140px; height: 140px; border-radius: 50%; border: 5px solid var(--royal-gold); 
            margin-bottom: 20px; object-fit: cover; background: #eee; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); 
        }

        /* App Main Wrapper */
        .royal-wrapper { height: 100vh; display: none; flex-direction: column; background: var(--bg-light); position: relative; overflow-y: auto; border: 10px solid var(--royal-gold); }
        
        header { 
            background: var(--royal-blue); color: var(--royal-gold); padding: 15px 30px; 
            display: flex; flex-direction: column; align-items: center; border-bottom: 5px solid var(--royal-gold); text-align: center;
        }
        .header-license-box { 
            background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 30px; 
            border: 1px solid var(--royal-gold); font-size: 14px; color: #fff; margin-top: 8px; 
        }

        .main-container { display: flex; flex: 1; flex-direction: column; }

        /* Responsive Panels */
        .panel { padding: 20px; background: white; width: 100%; }
        
        .rubric-panel { background: var(--royal-blue); order: 3; border-top: 4px solid var(--royal-gold); }
        .rubric-card { 
            background: rgba(255,255,255,0.08); border: 1px solid var(--royal-gold); 
            border-radius: 12px; padding: 15px; margin-bottom: 12px; color: #fff; 
        }
        
        .quran-panel { order: 1; min-height: 500px; border-bottom: 2px solid #ddd; }
        .q-text { 
            font-family: 'Amiri', serif; font-size: 30px; line-height: 2.5; 
            text-align: justify; direction: rtl; color: #222; padding: 10px;
        }
        .ayah-item { cursor: pointer; border-radius: 8px; padding: 2px 5px; }
        .ayah-item:hover { background: rgba(212, 175, 55, 0.2); }

        .report-panel { order: 2; background: var(--bg-light); border-bottom: 2px solid #ddd; }
        .section-title { 
            background: var(--royal-green); color: var(--royal-gold); padding: 12px; 
            border-radius: 10px; text-align: center; margin-bottom: 20px; font-weight: bold; 
        }

        /* Input Styles */
        input, select { 
            padding: 14px; border: 2px solid #ddd; border-radius: 12px; 
            font-family: 'Faruma'; width: 100%; margin-bottom: 12px; font-size: 16px; 
            background: #fff;
        }
        .btn-m { 
            cursor: pointer; border: none; padding: 12px; border-radius: 8px; 
            font-weight: bold; flex: 1; font-family: 'Faruma'; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .m1 { background: #ff9e9e; color: #721c24; } 
        .m05 { background: #ffcc80; color: #856404; } 
        .m025 { background: #fff59d; color: #857b26; }
        
        .gold-btn { 
            background: var(--gold-gradient); color: var(--royal-dark); border: none; 
            padding: 18px; border-radius: 12px; font-weight: bold; width: 100%; 
            font-size: 17px; margin-bottom: 12px; font-family: 'Faruma'; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Report Entry Styles */
        .rep-entry { 
            padding: 15px; border-radius: 12px; margin-bottom: 12px; 
            border: 1px solid #ddd; font-size: 15px; background: #fff; 
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } }
        .muta-box { border-right: 10px solid var(--royal-green); background: #f0fff4; }
        .error-box { border-right: 10px solid #b71c1c; background: #fff5f5; }
        .ref-tag { 
            font-size: 12px; display: block; margin-top: 8px; color: #444; 
            border-top: 1px solid #eee; padding-top: 5px; font-weight: bold; 
        }

        /* Signatures Area */
        #printJudges { display: none; margin-top: 50px; }
        .judge-sign-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; text-align: center; }
        .judge-line { border-top: 2px solid #000; margin-top: 50px; padding-top: 10px; font-weight: bold; }

        /* Float Buttons */
        #fs-orb { 
            position: fixed; bottom: 25px; left: 25px; width: 65px; height: 65px; 
            background: var(--gold-gradient); border-radius: 50%; border: 4px solid var(--royal-blue); 
            display: flex; align-items: center; justify-content: center; z-index: 3000; 
            font-size: 28px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); cursor: pointer;
        }

        /* Desktop Mode Enhancements */
        @media (min-width: 1024px) {
            header { flex-direction: row; justify-content: space-between; padding: 15px 50px; }
            .main-container { flex-direction: row; height: calc(100vh - 90px); overflow: hidden; }
            .rubric-panel { width: 350px; order: 1; border-top: none; border-left: 5px solid var(--royal-gold); height: 100%; overflow-y: auto; }
            .quran-panel { flex: 1; order: 2; height: 100%; overflow-y: auto; border-bottom: none; }
            .report-panel { width: 480px; order: 3; height: 100%; overflow-y: auto; border-left: 1px solid #ddd; }
            .royal-wrapper { overflow: hidden; }
            .q-text { font-size: 38px; padding: 40px; }
        }

        @media print { 
            .rubric-panel, header, #fs-orb, .quran-panel, input, select, .gold-btn, .reset-btn { display: none !important; } 
            .report-panel { width: 100% !important; border: none; display: block !important; padding: 0; } 
            .royal-wrapper { display: block !important; border: none; background: white; }
            #printJudges { display: block !important; }
            .rep-entry { border: 1px solid #000 !important; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-card">
            <img src="images/ali.png" alt="Profile" class="profile-img">
            <div style="font-family:'Cinzel'; font-size:26px; color:var(--royal-blue); font-weight:bold;">ROYAL QURAN SYSTEM</div>
            <div style="margin-bottom:25px; font-weight:bold; color:var(--royal-gold); font-size:18px;">ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް ސޮފްޓްވެއަރ</div>
            <input type="password" id="licenseInput" placeholder="ލައިސަންސް ކޯޑް ޖައްސަވާ" style="text-align:center;">
            <button class="gold-btn" onclick="activateSystem()">އެކްޓިވޭޓް ކުރައްވާ 🔑</button>
            <p id="errorMsg" style="color:red; font-size:14px; font-weight:bold;"></p>
        </div>
    </div>

    <div class="royal-wrapper" id="mainApp">
        <header>
            <div class="header-license-box" id="headerLicensee">ލައިސަންސް: ލޯޑް ވަނީ...</div>
            <h1 style="margin:0; font-size:24px;">ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް</h1>
            <div style="width: 200px;" class="desktop-only"></div>
        </header>

        <div class="main-container">
            <div class="panel rubric-panel">
                <div class="section-title">މާކްސް ރުބްރިކް</div>
                <div id="rubric-list"></div>
                <div style="background:var(--gold-gradient); padding:20px; border-radius:15px; text-align:center; color:var(--royal-dark); border:2px solid #fff; margin-top:10px;">
                    <div style="font-weight:bold; font-size:14px;">TOTAL SCORE</div>
                    <div id="totalScore" style="font-size:55px; font-weight:bold;">100</div>
                </div>
                <button class="gold-btn" style="background:#b71c1c; color:white; margin-top:30px;" onclick="resetAll()">RESET / NEW STUDENT 🔄</button>
            </div>

            <div class="panel quran-panel">
                <div style="background:#f4f4f4; padding:20px; border-radius:15px; border:1px solid #ddd; margin-bottom:20px; display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:15px;">
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">ދަރިވަރުގެ ނަން:</label>
                        <input type="text" id="stuName" placeholder="ނަން ލިޔުއްވާ..." oninput="updateReportSummary(); saveSession();">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">ސޫރަތް:</label>
                        <select id="surahSelect" onchange="loadSurah(); saveSession();"></select>
                    </div>
                </div>
                <div id="quranBox" class="q-text">
                    <p style="text-align:center; color:#bbb; padding-top:150px; font-size:20px;">ކިޔަވަން ފެށުމަށް ސޫރަތެއް ނަންގަވާ!</p>
                </div>
            </div>

            <div class="panel report-panel">
                <div class="section-title">އިމްތިޙާން ރިޕޯޓް</div>
                <div id="reportSummary" style="background:#fff; padding:20px; border-radius:15px; border:3px solid var(--royal-gold); margin-bottom:20px; line-height:2; font-size:17px;"></div>
                
                <div style="background:#eee; padding:15px; border-radius:15px; margin-bottom:20px;">
                    <span style="font-size:13px; font-weight:bold; color:var(--royal-blue); margin-bottom:10px; display:block;">ޖަޖުންގެ ނަންތައް:</span>
                    <input type="text" id="j1" placeholder="ޖަޖު 1" oninput="updateJudges(); saveSession();">
                    <input type="text" id="j2" placeholder="ޖަޖު 2" oninput="updateJudges(); saveSession();">
                    <input type="text" id="j3" placeholder="ޖަޖު 3" oninput="updateJudges(); saveSession();">
                </div>

                <div id="reportMarks" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;"></div>
                
                <div id="reportEntries">
                    </div>

                <div id="printJudges">
                    <div class="judge-sign-grid">
                        <div><div class="judge-line" id="p_j1">ޖަޖު 1</div></div>
                        <div><div class="judge-line" id="p_j2">ޖަޖު 2</div></div>
                        <div><div class="judge-line" id="p_j3">ޖަޖު 3</div></div>
                    </div>
                    <div style="margin-top:40px; text-align:center; font-size:12px; color:#555;">
                        Generated by Rasfahi System | Licensee: <span id="footerLicensee"></span>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="gold-btn" style="background:var(--royal-green); color:white;" onclick="saveSession(true)">SAVE DATA 💾</button>
                    <button class="gold-btn" onclick="window.print()">PRINT REPORT 🖨️</button>
                </div>
            </div>
        </div>
        <div id="fs-orb" onclick="toggleFS()">👑</div>
    </div>

<script>
    const INITIAL_SCORES = { "ކިޔެވުން": 50, "ތަޖުވީދު": 20, "މަޚްރަޖު": 10, "ޞިފަ": 10, "ފަޞާޙާ": 5, "ތަލައްފުޡް": 5 };
    let qData = [];
    let scores = {...INITIAL_SCORES};
    let clickTimer = 0;

    // --- SYSTEM ACTIVATION ---
    function activateSystem() {
        const input = document.getElementById('licenseInput').value.trim();
        const error = document.getElementById('errorMsg');
        try {
            const decoded = atob(input);
            if (decoded.startsWith("ROYAL_EXP_")) {
                const parts = decoded.split("_CUST_");
                const dateStr = parts[0].split("ROYAL_EXP_")[1];
                const custName = parts[1] || "Valued User";
                
                if (new Date(dateStr) >= new Date()) {
                    localStorage.setItem('rasfahi_final_active', 'true');
                    localStorage.setItem('rasfahi_final_user', custName);
                    startApp(custName);
                } else { error.innerText = "ލައިސަންސްގެ މުއްދަތު ހަމަވެއްޖެ!"; }
            } else { error.innerText = "ނުބައި ކޯޑެއް!"; }
        } catch(e) { error.innerText = "ސައްޙަ ނޫން ކޯޑެއް!"; }
    }

    function startApp(name) {
        document.getElementById('headerLicensee').innerText = "ލައިސަންސް: " + name;
        document.getElementById('footerLicensee').innerText = name;
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        initApp();
    }

    // --- INITIALIZATION ---
    function initApp() {
        const list = document.getElementById('rubric-list');
        list.innerHTML = '';
        for (let k in INITIAL_SCORES) {
            list.innerHTML += `
                <div class="rubric-card">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:10px; color:var(--royal-gold);">
                        <span>${k}</span><span id="sc-${k}">${scores[k]}</span>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-m m1" onclick="deduct('${k}',1)">-1</button>
                        <button class="btn-m m05" onclick="deduct('${k}',0.5)">-0.5</button>
                        <button class="btn-m m025" onclick="deduct('${k}',0.25)">-0.25</button>
                    </div>
                </div>`;
        }
        
        fetch('https://api.alquran.cloud/v1/quran/quran-uthmani')
            .then(r => r.json()).then(d => {
                qData = d.data.surahs;
                const sel = document.getElementById('surahSelect');
                sel.innerHTML = '<option value="">ސޫރަތެއް ނަންގަވާ</option>';
                qData.forEach(s => { sel.innerHTML += `<option value="${s.number}">${s.number}. ${s.name}</option>`; });
                loadSavedSession();
            });
    }

    // --- CORE MARKING ---
    function deduct(k, v) {
        scores[k] = Math.max(0, scores[k] - v);
        document.getElementById(`sc-${k}`).innerText = scores[k];
        updateDisplay();
        saveSession();
    }

    function updateDisplay() {
        const total = Object.values(scores).reduce((a,b)=>a+b,0).toFixed(2);
        document.getElementById('totalScore').innerText = total;
        const mDiv = document.getElementById('reportMarks');
        mDiv.innerHTML = '';
        for(let k in scores) { 
            mDiv.innerHTML += `<div style="background:#fff; border:1px solid #ddd; padding:8px; border-radius:8px; text-align:center; font-weight:bold; font-size:13px;">${k}: ${scores[k]}</div>`; 
        }
        updateReportSummary();
    }

    // --- QURAN ENGINE ---
    function loadSurah(savedVal = null) {
        const val = savedVal || document.getElementById('surahSelect').value;
        if(!val) return;
        if(savedVal) document.getElementById('surahSelect').value = val;
        const s = qData[val-1];
        document.getElementById('quranBox').innerHTML = s.ayahs.map(a => 
            `<span class="ayah-item" data-sname="${s.name}" data-anum="${a.numberInSurah}" data-pnum="${a.page}" data-juz="${a.juz}">${a.text}</span> 
             <span style="color:var(--royal-gold); font-weight:bold;"> (${a.numberInSurah}) </span>`
        ).join(' ');
        
        document.querySelectorAll('.ayah-item').forEach(span => {
            span.onclick = () => { 
                clearTimeout(clickTimer);
                clickTimer = setTimeout(() => { handleMuta(span.innerText); }, 300);
            };
            span.ondblclick = (e) => { 
                clearTimeout(clickTimer);
                logError(e);
            };
        });
        updateReportSummary();
    }

    // --- MUTASHABIH LOGIC ---
    function handleMuta(txt) {
        const searchTxt = txt.trim().substring(0, 25);
        let found = [];
        qData.forEach(s => s.ayahs.forEach(a => { 
            if(a.text.includes(searchTxt)) found.push({s: s.name, a: a.numberInSurah, p: a.page, j: a.juz}); 
        }));
        
        if(found.length > 1) {
            const div = document.createElement('div');
            div.className = 'rep-entry muta-box';
            let refs = found.slice(0,4).map(m => `<span class="ref-tag">📍 ${m.s} (${m.a}) | ޞަފްޙާ: ${m.p} | ފޮތް: ${m.j}</span>`).join('');
            div.innerHTML = `<b>މުތަޝާބިހް:</b> "${searchTxt}..." ${refs}`;
            document.getElementById('reportEntries').prepend(div);
            saveSession();
        }
    }

    // --- ERROR LOGGING ---
    function logError(e) {
        const d = e.target.dataset;
        const div = document.createElement('div');
        div.className = 'rep-entry error-box';
        div.innerHTML = `<b>ކިޔެވުމުގެ ކުށް:</b> ${e.target.innerText.substring(0,20)}... 
                         <span class="ref-tag">📍 ${d.sname} (${d.anum}) | ޞަފްޙާ: ${d.pnum} | ފޮތް: ${d.juz}</span>`;
        document.getElementById('reportEntries').prepend(div);
        deduct('ކިޔެވުން', 1);
        saveSession();
    }

    function updateReportSummary() {
        const name = document.getElementById('stuName').value || "................";
        const total = Object.values(scores).reduce((a,b)=>a+b,0).toFixed(2);
        const surah = document.getElementById('surahSelect').options[document.getElementById('surahSelect').selectedIndex]?.text || "....";
        document.getElementById('reportSummary').innerHTML = `
            <b>ދަރިވަރު:</b> ${name}<br>
            <b>ކިޔެވި ސޫރަތް:</b> ${surah}<br>
            <b>މާކްސް:</b> <span style="font-size:22px; color:var(--royal-green); font-weight:bold;">${total} / 100</span>`;
    }

    function updateJudges() {
        document.getElementById('p_j1').innerText = document.getElementById('j1').value || "ޖަޖު 1";
        document.getElementById('p_j2').innerText = document.getElementById('j2').value || "ޖަޖު 2";
        document.getElementById('p_j3').innerText = document.getElementById('j3').value || "ޖަޖު 3";
    }

    // --- SESSION & STORAGE ---
    function saveSession(isManual = false) {
        const data = { 
            scores, 
            stuName: document.getElementById('stuName').value, 
            surah: document.getElementById('surahSelect').value,
            j1: document.getElementById('j1').value,
            j2: document.getElementById('j2').value,
            j3: document.getElementById('j3').value,
            logs: document.getElementById('reportEntries').innerHTML 
        };
        localStorage.setItem('rasfahi_final_data', JSON.stringify(data));
        if(isManual) alert("ޑޭޓާ ރައްކާކުރެވިއްޖެ! ✅");
    }

    function loadSavedSession() {
        const raw = localStorage.getItem('rasfahi_final_data');
        if(!raw) return;
        const data = JSON.parse(raw);
        scores = data.scores || {...INITIAL_SCORES};
        document.getElementById('stuName').value = data.stuName || "";
        document.getElementById('j1').value = data.j1 || "";
        document.getElementById('j2').value = data.j2 || "";
        document.getElementById('j3').value = data.j3 || "";
        document.getElementById('reportEntries').innerHTML = data.logs || "";
        
        for (let k in scores) {
            const el = document.getElementById(`sc-${k}`);
            if(el) el.innerText = scores[k];
        }
        if(data.surah) loadSurah(data.surah);
        updateDisplay(); updateJudges();
    }

    function resetAll() {
        if(confirm("ހުރިހާ ރެކޯޑެއް ފޮހެލާ އާ ދަރިވަރަކަށް ރީސެޓް ކުރަންވީތޯ؟")) {
            localStorage.removeItem('rasfahi_final_data');
            location.reload();
        }
    }

    function toggleFS() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
    }

    window.onload = () => {
        const active = localStorage.getItem('rasfahi_final_active');
        const user = localStorage.getItem('rasfahi_final_user');
        if(active === 'true') startApp(user);
    };
</script>
</body>
</html>
