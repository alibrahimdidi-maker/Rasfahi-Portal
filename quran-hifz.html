<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް ސޮފްޓްވެއަރ</title>
    <style>
        /* -----------------------------------------
           1. FONTS & ROOT VARIABLES
        ----------------------------------------- */
        @font-face {
            font-family: 'Faruma';
            src: url('fonts/faruma.ttf') format('truetype'),
                 url('fonts/Faruma.woff') format('woff');
            font-weight: normal; font-style: normal; font-display: swap;
        }

        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cinzel:wght@600;800&display=swap');

        :root { 
            --royal-blue: #001a4d; 
            --royal-dark: #000c24; 
            --royal-green: #063d25; 
            --royal-gold: #d4af37; 
            --gold-gradient: linear-gradient(145deg, #d4af37, #f2d06b);
            --bg-light: #fdfbf7;
            --shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100vh; margin: 0; padding: 0; 
            font-family: 'Faruma', 'Thaana Keyboard', sans-serif; 
            background: var(--royal-dark); overflow: hidden; 
        }

        /* -----------------------------------------
           2. SECURITY & LOCK SCREEN
        ----------------------------------------- */
        #lock-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, var(--royal-blue), #000);
            display: flex; justify-content: center; align-items: center; z-index: 99999;
        }

        .lock-card {
            background: #ffffff; padding: 50px 40px; border-radius: 40px; 
            border: 8px solid var(--royal-gold); text-align: center; 
            width: 95%; max-width: 500px; box-shadow: 0 0 100px rgba(212, 175, 55, 0.4);
            animation: cardPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardPop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .profile-img-container {
            position: relative; width: 150px; height: 150px; margin: 0 auto 30px;
        }

        .profile-img { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 6px solid var(--royal-gold); object-fit: cover; 
            background: #f0f0f0; box-shadow: var(--shadow);
        }

        /* -----------------------------------------
           3. MAIN APP LAYOUT
        ----------------------------------------- */
        #mainApp { 
            display: none; /* Hidden until unlocked */
            height: 100vh; flex-direction: column; 
            background: var(--bg-light); border: 12px solid var(--royal-gold);
            position: relative;
        }

        header { 
            background: var(--royal-blue); color: var(--royal-gold); padding: 20px 40px; 
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 6px solid var(--royal-gold); box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .header-title h1 { margin: 0; font-size: 26px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .license-tag {
            background: rgba(255,255,255,0.1); padding: 8px 20px; border-radius: 50px;
            border: 1px solid var(--royal-gold); color: #fff; font-size: 14px;
        }

        .main-content { display: flex; flex: 1; overflow: hidden; flex-direction: column; }

        /* -----------------------------------------
           4. PANELS SYSTEM
        ----------------------------------------- */
        .panel { padding: 25px; overflow-y: auto; scroll-behavior: smooth; }

        /* Rubric Sidebar */
        .rubric-panel { 
            background: var(--royal-blue); width: 100%; order: 3;
            border-top: 6px solid var(--royal-gold); color: white;
        }

        .rubric-item {
            background: rgba(255,255,255,0.07); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px; padding: 18px; margin-bottom: 15px;
        }

        .rubric-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 12px; font-size: 18px; color: var(--royal-gold); }

        .mark-controls { display: flex; gap: 8px; }

        .btn-deduct {
            flex: 1; padding: 12px; border: none; border-radius: 10px; 
            font-family: 'Faruma'; font-weight: bold; cursor: pointer; font-size: 15px;
        }
        .m-1 { background: #ff4d4d; color: white; }
        .m-05 { background: #ffa64d; color: white; }
        .m-025 { background: #ffdb4d; color: #5c4d00; }

        /* Quran Display Area */
        .quran-panel { flex: 2; order: 1; border-bottom: 2px solid #ddd; background: #fff; }

        .q-controls {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
            margin-bottom: 25px; background: #f4f4f4; padding: 20px; border-radius: 20px;
        }

        .q-text-container {
            font-family: 'Amiri', serif; font-size: 32px; line-height: 2.5;
            text-align: justify; direction: rtl; color: #1a1a1a; padding: 20px;
        }

        .ayah-wrap { cursor: pointer; padding: 4px 6px; border-radius: 8px; transition: 0.3s; position: relative; }
        .ayah-wrap:hover { background: rgba(212, 175, 55, 0.1); }
        .ayah-num { color: var(--royal-gold); font-weight: bold; font-size: 22px; margin: 0 10px; }

        /* Report Panel */
        .report-panel { flex: 1.5; order: 2; background: var(--bg-light); border-left: 2px solid #ddd; }

        .summary-card {
            background: #fff; padding: 25px; border-radius: 20px; border: 4px solid var(--royal-gold);
            margin-bottom: 25px; box-shadow: var(--shadow);
        }

        .log-entry {
            padding: 18px; border-radius: 15px; margin-bottom: 15px; 
            background: #fff; border: 1px solid #eee; position: relative;
            animation: entryFade 0.4s ease;
        }
        @keyframes entryFade { from { opacity: 0; transform: translateY(-10px); } }

        .log-muta { border-right: 10px solid var(--royal-green); background: #f0fff4; }
        .log-error { border-right: 10px solid #b71c1c; background: #fff5f5; }

        .log-meta { 
            display: block; font-size: 12px; margin-top: 10px; color: #666; 
            border-top: 1px solid rgba(0,0,0,0.05); padding-top: 8px; font-weight: bold;
        }

        /* -----------------------------------------
           5. UI COMPONENTS
        ----------------------------------------- */
        input, select {
            width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ddd;
            font-family: 'Faruma'; font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--royal-gold); }

        .score-display {
            background: var(--gold-gradient); padding: 25px; border-radius: 20px;
            text-align: center; color: var(--royal-dark); margin: 20px 0;
            border: 3px solid #fff; box-shadow: var(--shadow);
        }

        .action-btn {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            font-family: 'Faruma'; font-size: 18px; font-weight: bold;
            cursor: pointer; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #fs-orb {
            position: fixed; bottom: 30px; left: 30px; width: 70px; height: 70px;
            background: var(--gold-gradient); border-radius: 50%; border: 4px solid var(--royal-blue);
            display: flex; align-items: center; justify-content: center; z-index: 9999;
            font-size: 30px; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* -----------------------------------------
           6. DESKTOP OPTIMIZATION
        ----------------------------------------- */
        @media (min-width: 1024px) {
            .main-content { flex-direction: row; }
            .rubric-panel { width: 380px; order: 1; border-top: none; border-left: 6px solid var(--royal-gold); }
            .quran-panel { order: 2; border-bottom: none; }
            .report-panel { width: 500px; order: 3; }
            .header-title h1 { font-size: 32px; }
        }

        /* -----------------------------------------
           7. PRINT STYLES
        ----------------------------------------- */
        @media print {
            header, .rubric-panel, #fs-orb, .q-controls, .action-btn, #reset-btn { display: none !important; }
            #mainApp { border: none !important; display: block !important; }
            .main-content { display: block !important; }
            .quran-panel { display: none !important; }
            .report-panel { width: 100% !important; padding: 0 !important; }
            .summary-card { border: 2px solid #000 !important; }
            .log-entry { border: 1px solid #000 !important; page-break-inside: avoid; }
            #printSignatures { display: grid !important; }
        }

        #printSignatures {
            display: none; grid-template-columns: 1fr 1fr 1fr; gap: 30px;
            margin-top: 100px; text-align: center;
        }
        .sig-line { border-top: 2px solid #000; padding-top: 10px; font-weight: bold; }

    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-card">
            <div class="profile-img-container">
                <img src="images/ali.png" alt="Admin" class="profile-img">
            </div>
            <h2 style="font-family:'Cinzel'; color:var(--royal-blue); margin:0; letter-spacing:2px;">ROYAL QURAN SYSTEM</h2>
            <p style="color:var(--royal-gold); font-weight:bold; font-size:18px; margin-top:10px;">ޤުރްއާން ޙިފްޡް ރެކޯޑް ސޮފްޓްވެއަރ</p>
            <div style="margin-top:30px;">
                <input type="password" id="passInput" placeholder="ލައިސަންސް ކޯޑް ޖައްސަވާ" style="text-align:center; border:3px solid #eee; background:#fafafa;">
                <button class="action-btn" style="background:var(--gold-gradient); margin-top:15px;" onclick="unlockSystem()">ހުޅުވާލުމަށް ފިއްތާލާ 🔑</button>
                <p id="errorMsg" style="color:#ff4d4d; font-weight:bold; margin-top:15px; min-height:20px;"></p>
            </div>
        </div>
    </div>

    <div id="mainApp">
        <header>
            <div class="header-title">
                <h1>ރަސްފަހި ޤުރްއާން ޙިފްޡް ރެކޯޑް</h1>
            </div>
            <div class="license-tag" id="userTag">ލައިސަންސް: ---</div>
        </header>

        <div class="main-content">
            <div class="panel rubric-panel">
                <div style="background:var(--royal-green); color:var(--royal-gold); padding:15px; border-radius:12px; text-align:center; font-weight:bold; margin-bottom:20px;">މާކްސް ރުބްރިކް</div>
                
                <div id="rubric-container">
                    </div>

                <div class="score-display">
                    <div style="font-weight:bold; font-size:14px; text-transform:uppercase;">Student Total Score</div>
                    <div id="finalScore" style="font-size:60px; font-weight:800;">100.00</div>
                </div>

                <button class="action-btn" id="reset-btn" style="background:#b71c1c; color:white;" onclick="fullReset()">އާ ދަރިވަރަކަށް ރީސެޓް ކުރައްވާ 🔄</button>
            </div>

            <div class="panel quran-panel">
                <div class="q-controls">
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">ދަރިވަރުގެ ނަން:</label>
                        <input type="text" id="stuName" placeholder="ނަން ލިޔުއްވާ..." oninput="syncSummary()">
                    </div>
                    <div>
                        <label style="font-size:12px; font-weight:bold; display:block; margin-bottom:5px;">ކިޔަވާ ސޫރަތް:</label>
                        <select id="surahSelect" onchange="fetchSurahContent()">
                            <option value="">ސޫރަތެއް ނަންގަވާ</option>
                        </select>
                    </div>
                </div>

                <div id="quranView" class="q-text-container">
                    <p style="text-align:center; color:#ccc; margin-top:150px; font-size:24px;">ސޫރަތެއް ނެންގެވުމުން އާޔަތްތައް މިތަނުން ފެންނާނެއެވެ.</p>
                </div>
            </div>

            <div class="panel report-panel">
                <div style="background:var(--royal-green); color:var(--royal-gold); padding:15px; border-radius:12px; text-align:center; font-weight:bold; margin-bottom:20px;">އިމްތިޙާން ރިޕޯޓް</div>
                
                <div class="summary-card" id="reportSummary">
                    </div>

                <div id="logList">
                    </div>

                <div id="printSignatures">
                    <div class="sig-line">ޖަޖު 1 ގެ ސޮއި</div>
                    <div class="sig-line">ޖަޖު 2 ގެ ސޮއި</div>
                    <div class="sig-line">ޖަޖު 3 ގެ ސޮއި</div>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
                    <button class="action-btn" style="background:var(--royal-green); color:white;" onclick="saveToDevice()">ސޭވް ކުރައްވާ 💾</button>
                    <button class="action-btn" style="background:var(--royal-gold); color:var(--royal-dark);" onclick="window.print()">ޕްރިންޓް ރިޕޯޓް 🖨️</button>
                </div>
            </div>
        </div>

        <div id="fs-orb" onclick="toggleFullScreen()">👑</div>
    </div>

<script>
    /* -----------------------------------------
       DATA & STATE
    ----------------------------------------- */
    const RUBRIC_DATA = {
        "ކިޔެވުން": 50,
        "ތަޖުވީދު": 20,
        "މަޚްރަޖު": 10,
        "ޞިފަ": 10,
        "ފަޞާޙާ": 5,
        "ތަލައްފުޡް": 5
    };

    let currentScores = {...RUBRIC_DATA};
    let allSurahs = [];
    let lastClickTime = 0;

    /* -----------------------------------------
       SECURITY LOGIC
    ----------------------------------------- */
    function unlockSystem() {
        const input = document.getElementById('passInput').value.trim();
        const error = document.getElementById('errorMsg');
        
        try {
            const dec = atob(input);
            if (dec.startsWith("ROYAL_EXP_")) {
                const parts = dec.split("_CUST_");
                const expiry = new Date(parts[0].replace("ROYAL_EXP_", ""));
                
                if (expiry >= new Date()) {
                    const userName = parts[1] || "Valued Customer";
                    localStorage.setItem('rasfahi_v10_auth', 'true');
                    localStorage.setItem('rasfahi_v10_user', userName);
                    launchApp(userName);
                } else {
                    error.innerText = "ލައިސަންސްގެ މުއްދަތު ހަމަވެއްޖެ!";
                }
            } else {
                error.innerText = "ނުބައި ކޯޑެއް! އަލުން މަސައްކަތް ކުރައްވާ.";
            }
        } catch(e) {
            error.innerText = "ސައްޙަ ނޫން ކޯޑެއް!";
        }
    }

    function launchApp(name) {
        document.getElementById('lock-screen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('userTag').innerText = "ލައިސަންސް: " + name;
        initInterface();
    }

    /* -----------------------------------------
       INTERFACE INIT
    ----------------------------------------- */
    function initInterface() {
        // Build Rubric UI
        const container = document.getElementById('rubric-container');
        container.innerHTML = '';
        for (let key in RUBRIC_DATA) {
            container.innerHTML += `
                <div class="rubric-item">
                    <div class="rubric-header">
                        <span>${key}</span>
                        <span id="score-${key}">${currentScores[key]}</span>
                    </div>
                    <div class="mark-controls">
                        <button class="btn-deduct m-1" onclick="updateMark('${key}', 1)">-1</button>
                        <button class="btn-deduct m-05" onclick="updateMark('${key}', 0.5)">-0.5</button>
                        <button class="btn-deduct m-025" onclick="updateMark('${key}', 0.25)">-0.25</button>
                    </div>
                </div>
            `;
        }

        // Fetch Surah List
        fetch('https://api.alquran.cloud/v1/surah')
            .then(res => res.json())
            .then(data => {
                allSurahs = data.data;
                const select = document.getElementById('surahSelect');
                allSurahs.forEach(s => {
                    let opt = document.createElement('option');
                    opt.value = s.number;
                    opt.innerText = `${s.number}. ${s.name} (${s.englishName})`;
                    select.appendChild(opt);
                });
                autoLoadSession();
            });
    }

    /* -----------------------------------------
       QURAN & INTERACTION LOGIC
    ----------------------------------------- */
    async function fetchSurahContent() {
        const num = document.getElementById('surahSelect').value;
        if (!num) return;

        const view = document.getElementById('quranView');
        view.innerHTML = '<p style="text-align:center; padding-top:50px;">ލޯޑް ވަނީ...</p>';

        try {
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/editions/quran-uthmani`);
            const data = await res.json();
            const surah = data.data[0];
            
            view.innerHTML = surah.ayahs.map(ayah => `
                <span class="ayah-wrap" 
                      data-sname="${surah.name}" 
                      data-anum="${ayah.numberInSurah}" 
                      data-page="${ayah.page}" 
                      data-juz="${ayah.juz}"
                      onclick="handleAyahClick(event, this)">
                    ${ayah.text}
                </span>
                <span class="ayah-num">(${ayah.numberInSurah})</span>
            `).join(' ');

            syncSummary();
            autoSave();
        } catch (e) {
            view.innerHTML = '<p style="color:red;">ޑޭޓާ ލޯޑް ކުރުމުގައި މައްސަލައެއް ދިމާވެއްޖެ!</p>';
        }
    }

    function handleAyahClick(event, element) {
        const now = new Date().getTime();
        const delta = now - lastClickTime;

        if (delta < 300 && delta > 0) {
            // DOUBLE CLICK -> ERROR LOGGING
            logError(element);
        } else {
            // SINGLE CLICK -> CHECK SELECTION
            setTimeout(() => {
                const selectedText = window.getSelection().toString().trim();
                if (selectedText.length > 4) {
                    logMutashabih(selectedText, element.dataset);
                    window.getSelection().removeAllRanges();
                }
            }, 250);
        }
        lastClickTime = now;
    }

    /* -----------------------------------------
       LOGGING SYSTEM
    ----------------------------------------- */
    function logMutashabih(text, meta) {
        const list = document.getElementById('logList');
        const entry = document.createElement('div');
        entry.className = 'log-entry log-muta';
        entry.innerHTML = `
            <div style="color:var(--royal-green); font-weight:bold; margin-bottom:5px;">މުތަޝާބިހް ފާހަގަކުރެވިފައި:</div>
            <div style="font-family:'Amiri'; font-size:18px;">"${text}"</div>
            <span class="log-meta">📍 ${meta.sname} (އާޔަތް: ${meta.anum}) | ޞަފްޙާ: ${meta.page} | ފޮތް: ${meta.juz}</span>
        `;
        list.prepend(entry);
        autoSave();
    }

    function logError(element) {
        const meta = element.dataset;
        const list = document.getElementById('logList');
        const entry = document.createElement('div');
        entry.className = 'log-entry log-error';
        
        // Take first 30 chars of ayah for reference
        const refText = element.innerText.substring(0, 35) + "...";
        
        entry.innerHTML = `
            <div style="color:#b71c1c; font-weight:bold; margin-bottom:5px;">ކިޔެވުމުގެ ކުށް:</div>
            <div style="font-family:'Amiri'; font-size:18px;">${refText}</div>
            <span class="log-meta">📍 ${meta.sname} (އާޔަތް: ${meta.anum}) | ޞަފްޙާ: ${meta.page} | ފޮތް: ${meta.juz}</span>
        `;
        list.prepend(entry);
        updateMark('ކިޔެވުން', 1); // Auto deduct 1 mark for error
        autoSave();
    }

    /* -----------------------------------------
       CALCULATION & SYNC
    ----------------------------------------- */
    function updateMark(key, val) {
        currentScores[key] = Math.max(0, currentScores[key] - val);
        document.getElementById(`score-${key}`).innerText = currentScores[key];
        
        // Calculate Total
        let total = 0;
        for (let k in currentScores) total += currentScores[k];
        
        document.getElementById('finalScore').innerText = total.toFixed(2);
        syncSummary();
        autoSave();
    }

    function syncSummary() {
        const name = document.getElementById('stuName').value || "................";
        const surah = document.getElementById('surahSelect').options[document.getElementById('surahSelect').selectedIndex]?.text || "....";
        const total = document.getElementById('finalScore').innerText;

        document.getElementById('reportSummary').innerHTML = `
            <div style="font-size:18px; margin-bottom:10px;"><b>ދަރިވަރު:</b> ${name}</div>
            <div style="font-size:16px; margin-bottom:10px;"><b>އިމްތިޙާން ކުރެވުނު ސޫރަތް:</b> ${surah}</div>
            <div style="font-size:24px; color:var(--royal-green); font-weight:bold; margin-top:15px; border-top:2px solid #eee; padding-top:10px;">
                ޖުމްލަ ނަތީޖާ: ${total} / 100
            </div>
        `;
    }

    /* -----------------------------------------
       PERSISTENCE (SAVE/LOAD)
    ----------------------------------------- */
    function autoSave() {
        const sessionData = {
            scores: currentScores,
            name: document.getElementById('stuName').value,
            surah: document.getElementById('surahSelect').value,
            logs: document.getElementById('logList').innerHTML
        };
        localStorage.setItem('rasfahi_v10_data', JSON.stringify(sessionData));
    }

    function autoLoadSession() {
        const raw = localStorage.getItem('rasfahi_v10_data');
        if (!raw) return;

        const data = JSON.parse(raw);
        currentScores = data.scores;
        document.getElementById('stuName').value = data.name || "";
        document.getElementById('logList').innerHTML = data.logs || "";
        
        // Sync Scores UI
        let total = 0;
        for (let k in currentScores) {
            document.getElementById(`score-${k}`).innerText = currentScores[k];
            total += currentScores[k];
        }
        document.getElementById('finalScore').innerText = total.toFixed(2);

        if (data.surah) {
            document.getElementById('surahSelect').value = data.surah;
            fetchSurahContent();
        }
        syncSummary();
    }

    function saveToDevice() {
        autoSave();
        alert("ޑޭޓާ ފޯނަށް ރައްކާކުރެވިއްޖެ! ✅");
    }

    function fullReset() {
        if (confirm("ހުރިހާ މައުލޫމާތެއް ފޮހެލާ އާ ދަރިވަރަކަށް ރީސެޓް ކުރަންވީތޯ؟")) {
            localStorage.removeItem('rasfahi_v10_data');
            location.reload();
        }
    }

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            if (document.exitFullscreen) document.exitFullscreen();
        }
    }

    /* -----------------------------------------
       STARTUP CHECK
    ----------------------------------------- */
    window.onload = () => {
        const isAuth = localStorage.getItem('rasfahi_v10_auth');
        const user = localStorage.getItem('rasfahi_v10_user');
        if (isAuth === 'true' && user) {
            launchApp(user);
        }
    };
</script>
</body>
</html>
